          <div class="claude-code-header">
            <span class="claude-code-language">${escapeHtml(languageLabel)}</span>
            <button type="button" class="claude-code-copy" data-action="copy-code" aria-label="Copy code" title="Copy code">${svg.clipboard}<span>Copy</span></button>
          </div>
          <pre class="code-block language-${escapeHtml(languageLabel)}" data-language="${escapeHtml(languageLabel)}"><code class="code-block-source">${renderedCode}</code></pre>
        </div>
      `;
    }

    function renderMarkdown(text, { streaming = false } = {}) {
      const blocks = splitMarkdownBlocks(removeMarkdownTableSeparatorRows(text));
      return blocks.map(block => {
        const trimmed = block.trim();
        const heading = trimmed.match(/^\*\*([^*]+)\*\*$/);
        if (heading) return `<h3>${escapeHtml(heading[1])}</h3>`;

        if (/^```/.test(trimmed)) {
          return renderCodeBlock(trimmed, { highlight: !streaming });
        }

        const atxHeading = trimmed.match(/^(#{1,6})\s+(.+)$/);
        if (atxHeading) {
          const level = Math.min(atxHeading[1].length, 4);
          return `<h${level}>${renderInlineMarkdown(atxHeading[2].trim())}</h${level}>`;
        }

        if (/^>\s?/.test(trimmed)) {
          const quote = trimmed.split('\n').map(line => line.replace(/^>\s?/, '')).join('\n');
          return `<blockquote>${renderInlineMarkdown(quote).replaceAll('\n', '<br>')}</blockquote>`;
        }

        const lines = trimmed.split('\n').filter(line => line.trim().length);
        const allBullets = lines.length > 0 && lines.every(line => /^\s*[-•]\s+/.test(line));
        if (allBullets) {
          return `<ul>${lines.map(line => {
            const depth = /^\s{2,}/.test(line) ? ' class="nested-item"' : '';
            return `<li${depth}>${renderInlineMarkdown(line.replace(/^\s*[-•]\s+/, ''))}</li>`;
          }).join('')}</ul>`;
        }

        const allNumbers = lines.length > 0 && lines.every(line => /^\s*\d+\.\s+/.test(line));
        if (allNumbers) {
          const start = (lines[0].match(/^\s*(\d+)\./) || [null, '1'])[1];
          return `<ol start="${escapeHtml(start)}">${lines.map(line => `<li>${renderInlineMarkdown(line.replace(/^\s*\d+\.\s+/, ''))}</li>`).join('')}</ol>`;
        }

        const numberedLead = trimmed.match(/^\s*(\d+)\.\s+([\s\S]*)$/);
        if (numberedLead) {
          const start = numberedLead[1];
          const content = numberedLead[2].replace(/\n/g, '<br>');
          return `<ol start="${escapeHtml(start)}"><li>${renderInlineMarkdown(content)}</li></ol>`;
        }

        return `<p>${renderInlineMarkdown(trimmed).replaceAll('\n', '<br>')}</p>`;
      }).join('');
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('show'), 1350);
    }


    function getLocalAssistantResponse(prompt) {
      const lower = String(prompt || '').toLowerCase();
      if (
        lower.includes('claude design') ||
        lower.includes('design-sync') ||
        lower.includes('design mcp') ||
        lower.includes('design guide')
      ) {
        return DESIGN_GUIDE;
      }
      if (
        lower.includes('code') ||
        lower.includes('coding') ||
        lower.includes('syntax') ||
        lower.includes('software architecture') ||
        lower.includes('ui/ux') ||
        lower.includes('vibe code') ||
        lower.includes('debug')
      ) {
        return CODING_DEMO_RESPONSE;
      }
      const response = assistantResponses[state.responseIndex % assistantResponses.length];
      state.responseIndex += 1;
      return response;
    }

    function buildCachedSystemPrompt() {
      return [selectedBehaviorSystem(), CLAUDE_AGENT_RUNTIME_SYSTEM].join(' ');
    }

    function buildRequestSystemPrompt() {
      const lastUserMessage = [...state.messages].reverse().find(message => message.role === 'user')?.content || '';
      const runtimeConfig = runtimeConfigForPrompt(lastUserMessage);
      return [
        runtimeDirectiveForPrompt(lastUserMessage),
        `Current UI model label: ${selectedBehaviorLabel()}. Effort: ${runtimeConfig.effort}. Thinking enabled: ${state.thinkingEnabled ? 'yes' : 'no'}.`,
        state.thinkingEnabled
          ? 'Thinking mode is ON: reason carefully, but return only the provider-supported summary and the final answer.'
          : 'Thinking mode is OFF: respond directly and quickly.',
        'For internet research, use the native web_search tool and then web_fetch for selected result URLs. Do not invent search endpoints or use curl as a substitute for web_search. Use run_command only for workspace inspection or an explicit public URL requested by the user.',
        `If the user asks what model you are, say: ${selectedBehaviorLabel()} behavior through the Claude Agent Runtime using ${AIAND_MODEL} on ai&.`, 
      ].join(' ');
    }

    function buildSystemPrompt() {
      return `${buildCachedSystemPrompt()} ${buildRequestSystemPrompt()}`;
    }

    function buildApiMessages() {
      const system = buildSystemPrompt();
      const history = state.messages
        .filter(message => !message.pending && (message.role === 'user' || message.role === 'assistant'))
        .slice(-12)
        .map(message => {
          let content = message.content || '';
          if (message.role === 'user' && Array.isArray(message.attachments)) {
            for (const attachment of message.attachments) {
              if (attachment.content) {
                content += `\n\n[Attached file: ${attachment.name || 'file'}]\n${attachment.content}`;
              } else if (attachment.name) {
                content += `\n\n[Attached file: ${attachment.name}]`;
              }
            }
          }
          return { role: message.role, content };
        });
      return [{ role: 'system', content: system }, ...history];
    }

    function cleanAnthropicBlock(block) {
      if (!block || typeof block !== 'object') return block;
      const clean = JSON.parse(JSON.stringify(block));
      Object.keys(clean).forEach(key => {
        if (key.startsWith('_')) delete clean[key];
      });
      return clean;
    }

    function buildAnthropicMessages() {
      return state.messages
        .filter(message => !message.pending && (message.role === 'user' || message.role === 'assistant'))
        .slice(-12)
        .flatMap(message => {
          if (message.role === 'assistant') {
            if (Array.isArray(message.anthropicTurns) && message.anthropicTurns.length) {
              return message.anthropicTurns.map(turn => ({
                role: turn.role,
                content: (turn.content || []).map(cleanAnthropicBlock),
              }));
            }
            const nativeBlocks = Array.isArray(message.anthropicContent) && message.anthropicContent.length
              ? message.anthropicContent.map(cleanAnthropicBlock)
              : [{ type: 'text', text: message.content || '' }];
            return [{ role: 'assistant', content: nativeBlocks }];
          }

          const content = [{ type: 'text', text: message.content || '' }];
          for (const attachment of message.attachments || []) {
            if (attachment.kind === 'image' && attachment.src?.startsWith('data:')) {
              const match = attachment.src.match(/^data:([^;]+);base64,(.+)$/);
              if (match) {
                content.push({
                  type: 'image',
                  source: { type: 'base64', media_type: match[1], data: match[2] },
                  cache_control: { type: 'ephemeral', ttl: '5m' },
                });
                continue;
              }
            }
            if (attachment.content) {
              content.push({
                type: 'document',
                source: { type: 'text', media_type: 'text/plain', data: attachment.content },
                title: attachment.name || 'Attached text',
                cache_control: { type: 'ephemeral', ttl: '5m' },
              });
            }
          }
          return { role: 'user', content };
        });
    }

    function buildAnthropicRequestBody(model, continuationMessages = []) {
      const prompt = [...state.messages].reverse().find(message => message.role === 'user')?.content || '';
      return {
        model,
        max_tokens: runtimeConfigForPrompt(prompt).maxTokens,
        system: [
          {
            type: 'text',
            text: buildCachedSystemPrompt(),
            cache_control: { type: 'ephemeral', ttl: '5m' },
          },
          {
            type: 'text',
            text: buildRequestSystemPrompt(),
          },
        ],
        messages: [...buildAnthropicMessages(), ...continuationMessages],
        tools: state.webSearchEnabled
          ? CLAUDE_CLIENT_TOOLS
          : CLAUDE_CLIENT_TOOLS.filter(tool => !['web_search', 'web_fetch'].includes(tool.name)),
        stream: true,
      };
    }

    function apiContentEvents(value, defaultType = 'text') {
      const events = [];
      const visit = (item, fallbackType = defaultType) => {
        if (item == null || item === '') return;
        if (Array.isArray(item)) {
          item.forEach(child => visit(child, fallbackType));
          return;
        }
        if (typeof item !== 'object') {
          events.push({ type: fallbackType, content: String(item) });
          return;
        }

        const rawType = String(item.type || fallbackType).toLowerCase();
        const type = rawType === 'text_delta' ? 'text'
          : rawType === 'thinking_delta' ? 'thinking'
          : rawType === 'input_json_delta' ? 'tool_use'
          : rawType;
        let content = '';
        if (type === 'text') content = item.text ?? item.content ?? '';
        else if (type === 'thinking') content = item.thinking ?? item.reasoning ?? item.text ?? item.content ?? '';
        else if (type === 'redacted_thinking') content = item.data ?? '';
        else if (rawType === 'input_json_delta') content = item.partial_json ?? '';
        else if (type === 'tool_use' || type === 'server_tool_use') content = item.input ?? item.arguments ?? item.content ?? '';
        else content = item.content ?? item.output ?? item.result ?? item.data ?? item.text ?? '';

        events.push({
          type,
          id: item.id || item.tool_use_id || '',
          name: item.name || item.function?.name || '',
          title: item.title || '',
          content: contentBlockText(content),
        });
      };
      visit(value, defaultType);
      return events;
    }

    function readOpenAIStreamChunk(chunk, onDelta) {
      const lines = String(chunk || '').split('\n');
      let sawDone = false;
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith('data:')) continue;
        const payload = trimmed.slice(5).trim();
        if (payload === '[DONE]') {
          sawDone = true;
          continue;
        }
        try {
          const data = JSON.parse(payload);
          const choice = data?.choices?.[0];
          const delta = choice?.delta;
          let emitted = false;
          const emit = (value, type = 'text') => {
            const events = apiContentEvents(value, type);
            events.forEach(event => onDelta(event));
            emitted = emitted || events.length > 0;
          };

          if (delta) {
            if (delta.reasoning_content != null) emit(delta.reasoning_content, 'thinking');
            else if (delta.reasoning != null) emit(delta.reasoning, 'thinking');
            if (delta.thinking != null) emit(delta.thinking, 'thinking');
            if (delta.content != null) emit(delta.content, 'text');
            if (delta.text != null) emit(delta.text, 'text');
            if (Array.isArray(delta.tool_calls)) {
              delta.tool_calls.forEach((toolCall, toolIndex) => emit({
                type: 'tool_use',
                id: toolCall.id || `tool-${toolIndex}`,
                name: toolCall.function?.name || '',
                content: toolCall.function?.arguments || '',
              }, 'tool_use'));
            }
          }

          if (!emitted && choice?.message) {
            const messageReasoning = choice.message.reasoning_content ?? choice.message.reasoning;
            if (messageReasoning != null) emit(messageReasoning, 'thinking');
            if (choice.message.content != null) emit(choice.message.content, 'text');
          }
          if (!emitted && data?.content_block != null) emit(data.content_block, data.content_block?.type || 'content');
          if (!emitted && data?.delta != null) emit(data.delta, data.delta?.type || 'text');
          if (!emitted && data?.content != null) emit(data.content, 'text');
        } catch {
          // Ignore partial/non-JSON stream keepalive lines.
        }
      }
      return sawDone;
    }

    function readAnthropicStreamChunk(chunk, onEvent) {
      let sawDone = false;
      for (const line of String(chunk || '').split('\n')) {
        const trimmed = line.trim();
        if (!trimmed.startsWith('data:')) continue;
        const payload = trimmed.slice(5).trim();
        if (!payload || payload === '[DONE]') {
          sawDone = sawDone || payload === '[DONE]';
          continue;
        }
        try {
          const event = JSON.parse(payload);
          onEvent(event);
          if (event.type === 'message_stop') sawDone = true;
        } catch {
          // Ignore keepalive or incomplete event lines.
        }
      }
      return sawDone;
    }

    function anthropicDisplayBlocks(rawBlocks, startedAt = Date.now()) {
      const output = [];
      const nativeSearches = new Map();
      const nativeFetches = new Map();

      rawBlocks.filter(Boolean).forEach((block, index) => {
        const type = String(block.type || 'content').toLowerCase();
        if (['text', 'thinking', 'redacted_thinking'].includes(type)) return;
        const rawBlock = cleanAnthropicBlock(block);

        // The custom Arena trace replaces the raw run_command tool_use card.
        // Keep the protocol block in history, but do not render a duplicate UI.
        if (type === 'tool_use' && block.name === 'run_command') return;

        // Convert Anthropic's native server-side web-search pair into the same
        // raw expandable Arena trace used by the local search fallback.
        if (type === 'server_tool_use' && block.name === 'web_search') {
          let input = block.input || {};
          if (!input.query && block._inputJson) {
            try { input = JSON.parse(block._inputJson); } catch {}
          }
          const toolId = block.id || `native-search-${index}`;
          const display = {
            id: `search-${toolId}`,
            type: 'search_execution',
            name: 'web_search',
            title: '',
            query: input.query || '',
            content: JSON.stringify(rawBlock, null, 2),
            format: 'search',
            success: block._complete ? true : null,
            status: block._complete ? 'complete' : 'running',
            startedAt: block._startedAt || startedAt,
            completedAt: block._completedAt,
            durationMs: block._completedAt ? Math.max(0, block._completedAt - (block._startedAt || startedAt)) : undefined,
          };
          nativeSearches.set(toolId, display);
          output.push(display);
          return;
        }

        if (type === 'web_search_tool_result') {
          const toolId = block.tool_use_id || `native-search-result-${index}`;
          const existing = nativeSearches.get(toolId);
          if (existing) {
            existing.content = `${existing.content}\n\n${JSON.stringify(rawBlock, null, 2)}`;
            existing.success = !rawBlock.content?.error_code;
            existing.status = block._complete ? 'complete' : 'running';
            existing.completedAt = block._completedAt;
            return;
          }
          const display = {
            id: `search-${toolId}`,
            type: 'search_execution',
            name: 'web_search',
            title: '',
            query: '',
            content: JSON.stringify(rawBlock, null, 2),
            format: 'search',
            success: !rawBlock.content?.error_code,
            status: block._complete ? 'complete' : 'running',
            startedAt: block._startedAt || startedAt,
            completedAt: block._completedAt,
          };
          nativeSearches.set(toolId, display);
          output.push(display);
          return;
        }

        if (type === 'server_tool_use' && String(block.name || '').includes('web_fetch')) {
          let input = block.input || {};
          if (!input.url && block._inputJson) {
            try { input = JSON.parse(block._inputJson); } catch {}
          }
          const toolId = block.id || `native-fetch-${index}`;
          const display = {
            id: `fetch-${toolId}`,
            type: 'fetch_execution',
            name: 'web_fetch',
            title: '',
            url: input.url || '',
            content: JSON.stringify(rawBlock, null, 2),
            format: 'fetch',
            success: block._complete ? true : null,
            status: block._complete ? 'complete' : 'running',
            startedAt: block._startedAt || startedAt,
            completedAt: block._completedAt,
            durationMs: block._completedAt ? Math.max(0, block._completedAt - (block._startedAt || startedAt)) : undefined,
          };
          nativeFetches.set(toolId, display);
          output.push(display);
          return;
        }

        if (type === 'web_fetch_tool_result') {
          const toolId = block.tool_use_id || `native-fetch-result-${index}`;
          const resultUrl = rawBlock.content?.url || '';
          const existing = nativeFetches.get(toolId);
          if (existing) {
            existing.url ||= resultUrl;
            existing.content = `${existing.content}\n\n${JSON.stringify(rawBlock, null, 2)}`;
            existing.success = !rawBlock.content?.error_code;
            existing.status = block._complete ? 'complete' : 'running';
            existing.completedAt = block._completedAt;
            return;
          }
          const display = {
            id: `fetch-${toolId}`,
            type: 'fetch_execution',
            name: 'web_fetch',
            title: '',
            url: resultUrl,
            content: JSON.stringify(rawBlock, null, 2),
            format: 'fetch',
            success: !rawBlock.content?.error_code,
            status: block._complete ? 'complete' : 'running',
            startedAt: block._startedAt || startedAt,
            completedAt: block._completedAt,
          };
          nativeFetches.set(toolId, display);
          output.push(display);
          return;
        }

        output.push({
          id: block.id || block.tool_use_id || `content-${index}`,
          type,
          name: block.name || '',
          title: '',
          content: JSON.stringify(rawBlock, null, 2),
          format: 'json',
          status: block._complete ? 'complete' : 'running',
          startedAt: block._startedAt || startedAt,
          completedAt: block._completedAt,
          durationMs: block._completedAt ? Math.max(0, block._completedAt - (block._startedAt || startedAt)) : undefined,
        });
      });
      return output;
    }

    function anthropicSnapshot(rawBlocks, model, startedAt, stopReason = null) {
      const text = rawBlocks
        .filter(Boolean)
        .filter(block => block.type === 'text' && block.text)
        .map(block => block.text)
        .join('\n\n');
      return {
        text,
        blocks: anthropicDisplayBlocks(rawBlocks, startedAt),
        anthropicContent: rawBlocks.filter(Boolean).map(cleanAnthropicBlock),
        model,
        stopReason,
      };
    }

    async function streamAiandMessagesModel(model, signal, onDelta, continuationMessages = []) {
      const controller = new AbortController();
      const abort = () => controller.abort();
      signal?.addEventListener('abort', abort, { once: true });
      const firstByteTimeout = setTimeout(() => controller.abort(), 18000);

      try {
        const response = await fetch(AIAND_MESSAGES_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': AIAND_API_KEY,
            'anthropic-version': '2023-06-01',
          },
          body: JSON.stringify(buildAnthropicRequestBody(model, continuationMessages)),
          signal: controller.signal,
        });
        clearTimeout(firstByteTimeout);

        if (!response.ok) {
          let data = null;
          try { data = await response.json(); } catch {}
          const errorMessage = data?.error?.message || data?.error || data?.message || `HTTP ${response.status}`;
          throw new Error(errorMessage);
        }
        if (!response.body) throw new Error('Streaming is not supported by this browser/response.');

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        const rawBlocks = [];
        const streamStartedAt = Date.now();
        let buffer = '';
        let doneSignal = false;
        let streamError = null;
        let stopReason = null;

        const publish = (event) => onDelta(event, anthropicSnapshot(rawBlocks, model, streamStartedAt, stopReason));
        const applyEvent = (event) => {
          if (event.type === 'error') {
            streamError = event.error?.message || 'Anthropic Messages stream error';
            return;
          }
          if (event.type === 'message_delta') {
            stopReason = event.delta?.stop_reason || stopReason;
            publish(event);
            return;
          }
          const index = Number(event.index ?? 0);
          if (event.type === 'content_block_start') {
            const block = { ...(event.content_block || { type: 'content' }) };
            block._startedAt = Date.now();
            block._complete = false;
            if (block.type === 'tool_use' || block.type === 'server_tool_use') block._inputJson = '';
            rawBlocks[index] = block;
            publish(event);
            return;
          }
          if (event.type === 'content_block_delta') {
            const delta = event.delta || {};
            const block = rawBlocks[index] || { type: 'content', _startedAt: Date.now(), _complete: false };
            rawBlocks[index] = block;
            if (delta.type === 'text_delta') {
              block.type = 'text';
              block.text = (block.text || '') + (delta.text || '');
            } else if (delta.type === 'thinking_delta') {
              block.type = 'thinking';
              block.thinking = (block.thinking || '') + (delta.thinking || '');
            } else if (delta.type === 'signature_delta') {
              block.signature = (block.signature || '') + (delta.signature || '');
            } else if (delta.type === 'input_json_delta') {
              block._inputJson = (block._inputJson || '') + (delta.partial_json || '');
            } else if (delta.type === 'citations_delta' && delta.citation) {
              block.citations = [...(block.citations || []), delta.citation];
            } else {
              const piece = delta.text ?? delta.data ?? delta.partial_json ?? '';
              if (piece) block.content = contentBlockText(block.content || '') + contentBlockText(piece);
            }
            publish(event);
            return;
          }
          if (event.type === 'content_block_stop') {
            const block = rawBlocks[index];
            if (block) {
              if (block._inputJson) {
                try { block.input = JSON.parse(block._inputJson); }
                catch { block.input = block._inputJson; }
              }
              block._complete = true;
              block._completedAt = Date.now();
            }
            publish(event);
          }
        };

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split('\n\n');
          buffer = parts.pop() || '';
          for (const part of parts) doneSignal = readAnthropicStreamChunk(part, applyEvent) || doneSignal;
          if (streamError) throw new Error(streamError);
          if (doneSignal) break;
        }
        if (buffer) readAnthropicStreamChunk(buffer, applyEvent);
        if (streamError) throw new Error(streamError);

        const completedAt = Date.now();
        rawBlocks.filter(Boolean).forEach(block => {
          block._complete = true;
          block._completedAt ||= completedAt;
          if (block._inputJson && block.input == null) {
            try { block.input = JSON.parse(block._inputJson); }
            catch { block.input = block._inputJson; }
          }
        });
        const result = anthropicSnapshot(rawBlocks, model, streamStartedAt, stopReason);
        if (!result.text.trim() && !rawBlocks.some(Boolean)) throw new Error(`${model} returned an empty Messages response.`);
        return result;
      } finally {
        clearTimeout(firstByteTimeout);
        signal?.removeEventListener('abort', abort);
      }
    }

    async function streamAiandModel(model, signal, onDelta) {
      const controller = new AbortController();
      const abort = () => controller.abort();
      signal?.addEventListener('abort', abort, { once: true });
      const firstByteTimeout = setTimeout(() => controller.abort(), 18000);

      try {
        const response = await fetch(AIAND_API_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${AIAND_API_KEY}`,
          },
          body: JSON.stringify({
            model,
            messages: buildApiMessages(),
            temperature: 0.7,
            reasoning: state.thinkingEnabled
              ? { enabled: true, effort: zenMuxReasoningEffort() }
              : { enabled: false },
            stream: true,
          }),
          signal: controller.signal,
        });
        clearTimeout(firstByteTimeout);

        if (!response.ok) {
          let data = null;
          try { data = await response.json(); } catch {}
          const errorMessage = data?.error?.message || data?.error || data?.message || `HTTP ${response.status}`;
          throw new Error(errorMessage);
        }

        if (!response.body) throw new Error('Streaming is not supported by this browser/response.');

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullText = '';
        let doneSignal = false;
        const blocks = [];
        const blockByKey = new Map();
        const streamStartedAt = Date.now();

        const appendEvent = (event) => {
          const type = String(event.type || 'text').toLowerCase();
          if (type === 'text') {
            fullText += event.content || '';
          } else {
            const key = event.id || (type === 'thinking' ? 'thinking' : `${type}:${event.name || event.title || blocks.length}`);
            let block = blockByKey.get(key);
            if (!block) {
              block = {
                id: key,
                type,
                name: event.name || '',
                title: event.title || '',
                content: '',
                status: 'running',
                startedAt: Date.now(),
              };
              blockByKey.set(key, block);
              blocks.push(block);
            }
            block.content += event.content || '';
            if (event.name) block.name = event.name;
            if (event.title) block.title = event.title;
          }

          onDelta(event, {
            text: fullText,
            blocks: blocks.map(block => ({ ...block })),
            model,
          });
        };

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split('\n\n');
          buffer = parts.pop() || '';
          for (const part of parts) {
            doneSignal = readOpenAIStreamChunk(part, appendEvent) || doneSignal;
          }
          if (doneSignal) break;
        }

        if (buffer) readOpenAIStreamChunk(buffer, appendEvent);

        const completedAt = Date.now();
        const completedBlocks = blocks.map(block => ({
          ...block,
          status: 'complete',
          completedAt,
          durationMs: Math.max(0, completedAt - (block.startedAt || streamStartedAt)),
        }));
        const hasBlockContent = completedBlocks.some(block => block.content || block.type === 'redacted_thinking');
        if (!fullText.trim() && !hasBlockContent) throw new Error(`${model} returned an empty streamed response.`);
        return { text: fullText, blocks: completedBlocks, model };
      } finally {
        clearTimeout(firstByteTimeout);
        signal?.removeEventListener('abort', abort);
      }
    }

    function parseToolInput(input) {
      if (input && typeof input === 'object') return input;
      try { return JSON.parse(String(input || '{}')); }
      catch { return {}; }
    }

    async function browserSearchFallback(query, maxResults = 5, signal) {
      const limit = Math.max(1, Math.min(Number(maxResults) || 5, 8));
      const results = [];
      const seen = new Set();
      const addResult = (title, url, snippet = '') => {
        if (!url || seen.has(url) || results.length >= limit) return;
        seen.add(url);
        results.push({ title: title || 'Untitled result', url, snippet: snippet || '' });
      };

      const errors = [];
      try {
        const duckUrl = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1&origin=*`;
        const response = await fetch(duckUrl, { signal });
        if (!response.ok) throw new Error(`DuckDuckGo HTTP ${response.status}`);
        const data = await response.json();
        if (data.AbstractURL) addResult(data.Heading || query, data.AbstractURL, data.AbstractText || data.Abstract || '');
        for (const item of data.Results || []) addResult(item.Text, item.FirstURL, item.Text);
        const flattenTopics = topics => {
          for (const topic of topics || []) {
            if (Array.isArray(topic.Topics)) flattenTopics(topic.Topics);
            else addResult(topic.Text, topic.FirstURL, topic.Text);
          }
        };
        flattenTopics(data.RelatedTopics);
      } catch (error) {
        if (error?.name === 'AbortError') throw error;
        errors.push(`DuckDuckGo: ${error?.message || error}`);
      }

      if (results.length < limit) {
        try {
          const wikiUrl = `https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(query)}&limit=${limit}&namespace=0&format=json&origin=*`;
          const response = await fetch(wikiUrl, { signal });
          if (!response.ok) throw new Error(`Wikipedia HTTP ${response.status}`);
          const data = await response.json();
          const titles = data?.[1] || [];
          const descriptions = data?.[2] || [];
          const urls = data?.[3] || [];
          titles.forEach((title, index) => addResult(title, urls[index], descriptions[index]));
        } catch (error) {
          if (error?.name === 'AbortError') throw error;
          errors.push(`Wikipedia: ${error?.message || error}`);
        }
      }

      if (!results.length) throw new Error(errors.join(' | ') || 'No browser-search results were returned.');
      return {
        ok: true,
        query,
        provider: 'Browser fallback (DuckDuckGo + Wikipedia)',
        results,
        result_count: results.length,
        duration_ms: 0,
      };
    }

    async function executeClientToolBlocks(toolUses, index, baseText, baseBlocks, signal) {
      const toolResults = [];
      const outputBlocks = [];

      for (const toolUse of toolUses) {
        const input = parseToolInput(toolUse.input);
        const isCommand = toolUse.name === 'run_command';
        const isSearch = toolUse.name === 'web_search';
        let command = String(input.command || '');
        const query = String(input.query || '');
        const traceId = `${isSearch ? 'search' : isCommand ? 'command' : 'tool'}-${toolUse.id}`;
        const runningBlock = {
          id: traceId,
          type: isSearch ? 'search_execution' : isCommand ? 'command_execution' : 'tool_execution',
          title: isSearch ? 'Searching the web' : isCommand ? 'Running command' : `Running ${toolUse.name || 'tool'}`,
          content: isSearch
            ? `Query: ${query || '(waiting for query)'}\n\nWaiting for search results…`
            : `$ ${command || '(waiting for command)'}\n\nWaiting for output…`,
          format: isSearch ? 'search' : 'terminal',
          toolName: isSearch ? 'Web search' : isCommand ? 'Bash' : (toolUse.name || 'Tool'),
          command,
          query,
          success: null,
          status: 'running',
          startedAt: Date.now(),
        };

        const message = state.messages[index];
        if (message?.pending) {
          message.content = baseText;
          message.contentBlocks = [...baseBlocks, ...outputBlocks, runningBlock];
          updateAssistantStreamingMessage(index, { force: true });
        }

        let result;
        try {
          if (isCommand) {
            const response = await fetch(agentServerUrl('/api/run-command'), {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ command }),
              signal,
            });
            result = await response.json();
            if (!response.ok) throw new Error(result.error || `Command endpoint returned HTTP ${response.status}`);
          } else if (isSearch) {
            try {
              const response = await fetch(agentServerUrl('/api/web-search'), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, max_results: input.max_results || 5 }),
                signal,
              });
              result = await response.json();
              if (!response.ok || !result.ok) {
                throw new Error(result.error || `Search endpoint returned HTTP ${response.status}`);
              }
            } catch (localError) {
              if (localError?.name === 'AbortError') throw localError;
              result = await browserSearchFallback(query, input.max_results || 5, signal);
              result.local_server_error = localError?.message || String(localError);
            }
          } else {
            result = { ok: false, error: `Unsupported client tool: ${toolUse.name || 'unknown'}` };
          }
        } catch (error) {
          if (error?.name === 'AbortError') throw error;
          result = {
            ok: false,
            command: isCommand ? command : undefined,
            query: isSearch ? query : undefined,
            stdout: '',
            stderr: `${isSearch ? 'Search' : 'Command'} backend unavailable. Start this project with: python3 server.py\n${error?.message || error}`,
            return_code: 1,
            results: [],
          };
        }

        if (isCommand && result.command) command = String(result.command);

        const toolResult = {
          type: 'tool_result',
          tool_use_id: toolUse.id,
          content: JSON.stringify(result),
          is_error: !result.ok,
        };
        toolResults.push(toolResult);
        const completedAt = Date.now();
        let displayContent;
        if (isSearch) {
          const searchLines = [
            `Query: ${query || '(no query)'}`,
            result.provider ? `Provider: ${result.provider}` : '',
            ...(result.results || []).flatMap((item, resultIndex) => [
              `${resultIndex + 1}. ${item.title || 'Untitled result'}`,
              item.url || '',
              item.snippet || '',
            ]),
            result.error || result.stderr || '',
            Number.isFinite(Number(result.duration_ms)) ? `Completed in ${result.duration_ms} ms` : '',
          ];
          displayContent = searchLines.filter(Boolean).join('\n\n');
        } else {
          displayContent = [
            `$ ${command || '(no command)'}`,
            result.stdout ? String(result.stdout).replace(/\s+$/, '') : '',
            result.stderr ? String(result.stderr).replace(/\s+$/, '') : '',
            `Process exited with code ${Number.isFinite(Number(result.return_code)) ? result.return_code : 1}`,
            Number.isFinite(Number(result.duration_ms)) ? `Completed in ${result.duration_ms} ms` : '',
          ].filter(Boolean).join('\n\n');
        }
        outputBlocks.push({
          id: traceId,
          type: isSearch ? 'search_execution' : isCommand ? 'command_execution' : 'tool_execution',
          title: isSearch ? 'Searched the web' : isCommand ? 'Ran command' : `Ran ${toolUse.name || 'tool'}`,
          content: displayContent,
          format: isSearch ? 'search' : 'terminal',
          toolName: isSearch ? 'Web search' : isCommand ? 'Bash' : (toolUse.name || 'Tool'),
          command,
          query,
          success: Boolean(result.ok),
          rawResult: result,
          status: 'complete',
          startedAt: runningBlock.startedAt,
          completedAt,
          durationMs: Math.max(0, completedAt - runningBlock.startedAt),
        });

        if (message?.pending) {
          message.contentBlocks = [...baseBlocks, ...outputBlocks];
          updateAssistantStreamingMessage(index, { force: true });
        }
      }

      return { toolResults, outputBlocks };
    }

    async function callAiandChatStreaming(index, signal) {
      let lastError = null;
      const resetPending = (model, protocol) => {
        const message = state.messages[index];
        if (!message?.pending) return;
        message.content = '';
        message.contentBlocks = [];
        message.anthropicContent = [];
        message.anthropicTurns = [];
        message.activeBackendModel = model;
        message.activeProtocol = protocol;
        updateAssistantStreamingMessage(index, { force: true });
      };
      const applySnapshot = (snapshot, protocol) => {
        const message = state.messages[index];
        if (!message?.pending) return;
        message.content = snapshot.text;
        message.contentBlocks = snapshot.blocks;
        message.anthropicContent = snapshot.anthropicContent || [];
        message.activeBackendModel = snapshot.model;
        message.activeProtocol = protocol;
        updateAssistantStreamingMessage(index);
      };

      // Claude Messages protocol first: preserve typed blocks and run the
      // client-side command tool until the assistant reaches a final text turn.
      for (const model of AIAND_MODELS) {
        try {
          resetPending(model, 'anthropic-messages');
          const continuationMessages = [];
          const anthropicTurns = [];
          const completedText = [];
          const completedBlocks = [];

          for (let toolRound = 0; toolRound < 6; toolRound += 1) {
            const result = await streamAiandMessagesModel(model, signal, (_event, snapshot) => {
              applySnapshot({
                ...snapshot,
                text: [...completedText, snapshot.text].filter(text => text?.trim()).join('\n\n'),
                blocks: [...completedBlocks, ...snapshot.blocks],
              }, 'anthropic-messages');
            }, continuationMessages);

            if (result.text?.trim()) completedText.push(result.text);
            completedBlocks.push(...result.blocks);
            anthropicTurns.push({ role: 'assistant', content: result.anthropicContent });

            if (result.stopReason !== 'tool_use') {
              return {
                ...result,
                text: completedText.join('\n\n'),
                blocks: completedBlocks,
                anthropicTurns,
              };
            }

            const toolUses = result.anthropicContent.filter(block => block.type === 'tool_use');
            if (!toolUses.length) {
              throw new Error('The model stopped for tool use without returning a client tool_use block.');
            }

            const currentText = completedText.join('\n\n');
            const executed = await executeClientToolBlocks(toolUses, index, currentText, completedBlocks, signal);
            completedBlocks.push(...executed.outputBlocks);
            const toolTurn = { role: 'user', content: executed.toolResults };
            anthropicTurns.push(toolTurn);
            continuationMessages.splice(0, continuationMessages.length, ...anthropicTurns);
          }

          throw new Error('Command tool loop exceeded 6 rounds.');
        } catch (error) {
          if (error?.name === 'AbortError') throw error;
          lastError = `${model} (Messages): ${error?.message || error}`;
          console.warn('ai& Messages model failed:', lastError);
        }
      }

      // Compatibility fallback for models temporarily unavailable through the
      // Messages protocol. Regular text/reasoning separation still works here.
      for (const model of AIAND_MODELS) {
        try {
          resetPending(model, 'openai-chat');
          const result = await streamAiandModel(model, signal, (_event, snapshot) => {
            applySnapshot(snapshot, 'openai-chat');
          });
          return result;
        } catch (error) {
          if (error?.name === 'AbortError') throw error;
          lastError = `${model} (Chat): ${error?.message || error}`;
          console.warn('ai& streaming model failed:', lastError);
        }
      }

      throw new Error(lastError || 'No ai& model is currently available.');
    }

    async function callAiandChat(signal) {
      let lastError = null;

      for (const model of AIAND_MODELS) {
        try {
          const response = await fetch(AIAND_API_ENDPOINT, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${AIAND_API_KEY}`,
            },
            body: JSON.stringify({
              model,
              messages: buildApiMessages(),
              temperature: 0.7,
              reasoning: state.thinkingEnabled
                ? { enabled: true, effort: zenMuxReasoningEffort() }
                : { enabled: false },
              max_tokens: runtimeConfigForPrompt([...state.messages].reverse().find(message => message.role === 'user')?.content || '').maxTokens,
              stream: false,
            }),
            signal,
          });

          let data = null;
          try { data = await response.json(); } catch {}
          if (!response.ok) {
            lastError = data?.error?.message || data?.error || data?.message || `HTTP ${response.status}`;
            continue;
          }

          const content = data?.choices?.[0]?.message?.content || data?.content || data?.output_text;
          if (!content) {
            lastError = `${model} returned an empty response.`;
            continue;
          }

          return String(content);
        } catch (error) {
          if (error?.name === 'AbortError') throw error;
          lastError = error?.message || String(error);
        }
      }

      throw new Error(lastError || 'No ai& model is currently available.');
    }

    async function getAssistantResponse(prompt, signal) {
      try {
        return await callAiandChat(signal);
      } catch (error) {
        if (error?.name === 'AbortError') throw error;
        console.warn('ai& request failed:', error);
        return [
          `All ai& model attempts failed.`,
          ``,
          `Tried: ${AIAND_MODELS.join(', ')}`,
          ``,
          `Possible causes: insufficient ai& credit, temporary model unavailability, invalid/expired API key, or browser/network blocking.`,
          ``,
          `Temporary local fallback response:`,
          ``,
          getLocalAssistantResponse(prompt),
        ].join('\n');
      }
    }

      return CLAUDE_MODELS.find(model => model.id === state.model) || CLAUDE_MODELS[0];
    }

    function primaryKind() {
      if (state.isRunning) return 'cancel';
      if (state.isDictating) return 'stopDictation';
      if (state.draft.trim()) return 'send';
      return 'dictate';
    }

        return `<button type="button" class="primary-action" data-action="primary" aria-label="Cancel response" title="Cancel response"><span class="stop-square"></span></button>`;

        return `<button type="button" class="primary-action" data-action="primary" aria-label="Stop dictation" title="Stop dictation"><span class="stop-square pulse"></span></button>`;

      if (kind === 'send') {
        return `<button type="button" class="primary-action" data-action="primary" aria-label="Send message" title="Send message">${svg.arrowUp}</button>`;
      }
      return `<button type="button" class="primary-action is-neutral" data-action="primary" aria-label="Use voice mode" title="Use voice mode">${svg.audioLines}</button>`;

    function formatAttachmentSize(bytes) {
      const size = Number(bytes || 0);
      if (!size) return '0 KB';
      if (size < 1024) return `${size} B`;
      if (size < 1024 * 1024) return `${(size / 1024).toFixed(2)} KB`;
      return `${(size / 1024 / 1024).toFixed(2)} MB`;
    }

    function lineCountForText(text) {
      const value = String(text || '');
      if (!value) return 0;
      return value.split(/\r\n|\r|\n/).length;
    }

    function fileExtension(name) {
      const match = String(name || '').trim().match(/\.([A-Za-z0-9]+)$/);
      return match ? match[1].toLowerCase() : '';
    }

    function isTextLikeFile(file) {
      const name = String(file?.name || '');
      const type = String(file?.type || '');
      return type.startsWith('text/') || /\.(txt|md|markdown|csv|json|jsonl|log|xml|html|htm|css|js|jsx|ts|tsx|py|java|c|cpp|h|hpp|cs|go|rs|rb|php|sh|bash|zsh|fish|yaml|yml|toml|ini|env|sql)$/i.test(name);
    }

    function attachmentMarkup(attachment) {
      if (attachment.kind === 'pasted' || attachment.kind === 'text') {
        const isPasted = attachment.kind === 'pasted';
        const lines = attachment.lines || lineCountForText(attachment.content);
        const label = isPasted ? 'Pasted Text' : (attachment.name || 'Text file');
        const badge = isPasted ? 'pasted' : (fileExtension(attachment.name) || 'txt');
        const aria = `${label}, ${badge}, ${lines || 0} ${(lines || 0) === 1 ? 'line' : 'lines'}`;
        const preview = String(attachment.content || '').trim() || (isPasted ? 'Pasted content' : `Loading ${label}…`);
        return `
          <div class="attachment-root pasted-thumbnail group-thumbnail" data-attachment-id="${escapeHtml(attachment.id)}" data-testid="file-thumbnail">
            <button type="button" class="pasted-thumb-button" data-action="open-pasted-content" data-attachment-id="${escapeHtml(attachment.id)}" aria-label="${escapeHtml(aria)}" title="${escapeHtml(label)}">
              <div class="pasted-thumb-preview-wrap">
                <p class="pasted-thumb-preview">${escapeHtml(preview)}</p>
              </div>
              <div class="pasted-thumb-footer">
                <div class="pasted-type-pill"><span>${escapeHtml(badge)}</span></div>
              </div>
            </button>
            <button type="button" class="attachment-remove" data-action="remove-attachment" data-attachment-id="${escapeHtml(attachment.id)}" aria-label="Remove ${escapeHtml(aria)}">${svg.crossSmall}</button>
          </div>
        `;
      }
      const meta = attachment.size ? formatAttachmentSize(attachment.size) : (attachment.type || 'file');
      const thumb = attachment.kind === 'image' && attachment.src
        ? `<img alt="Attachment" src="${escapeHtml(attachment.src)}" />`
        : `<div class="file-thumb">${svg.file}<span class="file-name">${escapeHtml(attachment.name || 'File')}</span><span class="file-meta">${escapeHtml(meta)}</span></div>`;
      return `
        <div class="attachment-root" data-attachment-id="${escapeHtml(attachment.id)}">
          <div class="attachment-thumb">${thumb}</div>
          <button type="button" class="attachment-remove" data-action="remove-attachment" data-attachment-id="${escapeHtml(attachment.id)}" aria-label="Remove attachment">${svg.crossSmall}</button>

    function humanizeContentBlockType(type) {
      return String(type || 'content')
        .replace(/_tool_result$/i, ' result')
        .replace(/_/g, ' ')
        .replace(/\b\w/g, letter => letter.toUpperCase());
    }

    function contentBlockText(value) {
      if (value == null) return '';
      if (typeof value === 'string') return value;
      try { return JSON.stringify(value, null, 2); }
      catch { return String(value); }
    }

    function formatThinkingDuration(milliseconds) {
      const ms = Math.max(0, Number(milliseconds || 0));
      if (ms < 1000) return '<1s';
      const seconds = Math.round(ms / 1000);
      if (seconds < 60) return `${seconds}s`;
      const minutes = Math.floor(seconds / 60);
      const remainder = seconds % 60;
      return remainder ? `${minutes}m ${remainder}s` : `${minutes}m`;
    }

    function contentBlockLabel(block, message) {
      const type = String(block.type || 'content').toLowerCase();
      const running = message.pending && block.status !== 'complete' && block.status !== 'stopped';
      if (type === 'thinking') {
        if (running) return 'Thinking…';
        const duration = block.durationMs || Math.max(0, (block.completedAt || Date.now()) - (block.startedAt || message.startedAt || Date.now()));
        return `Thought for ${formatThinkingDuration(duration)}`;
      }
      if (type === 'redacted_thinking') return 'Thinking unavailable';
      if (block.title) return block.title;
      if (type === 'tool_use' || type === 'server_tool_use') return `${running ? 'Using' : 'Used'} ${block.name || 'a tool'}`;
      if (type.includes('web_search')) return type.includes('result') ? 'Web search results' : 'Searched the web';
      if (type.includes('web_fetch')) return type.includes('result') ? 'Fetched content' : 'Fetched a page';
      if (type.includes('code_execution')) return type.includes('result') ? 'Code execution result' : 'Ran code';
      return humanizeContentBlockType(type);
    }

    function contentBlockBodyMarkup(block, message) {
      const type = String(block.type || 'content').toLowerCase();
      if (type === 'redacted_thinking') return '';
      const content = contentBlockText(block.content);
      if (!content) return '';
      if (type === 'thinking' || block.format === 'markdown') {
        return renderMarkdown(content, { streaming: Boolean(message.pending) });
      }
      if (block.format === 'terminal') {
        return `<pre class="command-output-data">${escapeHtml(content)}</pre>`;
      }
      if (block.format === 'search') {
        return `<pre class="search-output-data">${escapeHtml(content)}</pre>`;
      }
      if (block.format === 'fetch') {
        return `<pre class="fetch-output-data">${escapeHtml(content)}</pre>`;
      }
      return `<pre class="content-block-data">${escapeHtml(content)}</pre>`;
    }

    const arenaTraceIcons = {
      search: `<svg class="arena-trace-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M17 17 21 21" stroke-linecap="round" stroke-linejoin="round"/><circle cx="11" cy="11" r="8"/></svg>`,
      globe: `<svg class="arena-trace-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M13 2.05S16 6 16 12s-3 9.95-3 9.95M11 21.95S8 18 8 12s3-9.95 3-9.95M2.63 15.5h18.74M2.63 8.5h18.74" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
      link: `<svg class="arena-trace-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.07.07l2-2a5 5 0 0 0-7.07-7.07l-1.15 1.15M14 11a5 5 0 0 0-7.07-.07l-2 2A5 5 0 0 0 12 20l1.15-1.15" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
      terminal: `<svg class="arena-trace-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M13 16h5M6 8l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/><rect x="2" y="4" width="20" height="16" rx="2"/></svg>`,
      command: `<svg class="arena-trace-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M13 17h7M5 7l5 5-5 5" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
      check: `<svg class="arena-trace-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="m5 13 4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
      error: `<svg class="arena-trace-error" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="m7 7 10 10M17 7 7 17" stroke-linecap="round"/></svg>`,
      right: `<svg class="arena-group-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="m9 6 6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
      down: `<svg class="arena-item-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="m6 9 6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    };

    function arenaDurationLabel(milliseconds) {
      const ms = Math.max(0, Math.round(Number(milliseconds || 0)));
      return ms < 1000 ? `${ms}ms` : `${(ms / 1000).toFixed(ms < 10000 ? 1 : 0)}s`;
    }

    function arenaSearchGroupMarkup(blocks, fetchBlocks, message) {
      if (!blocks.length && !fetchBlocks.length) return '';
      const running = [...blocks, ...fetchBlocks].some(block => block.status === 'running');
      const searchRows = blocks.map((block, index) => {
        const query = block.query || block.rawResult?.query || 'web search';
        const label = `${block.status === 'running' ? 'Searching for' : 'Searched for'} “${query}”`;
        const body = contentBlockBodyMarkup(block, message);
        return `<details class="arena-trace-item arena-search-item" data-content-block-id="${escapeHtml(block.id || `search-${index}`)}">
          <summary>${arenaTraceIcons.globe}<span class="arena-search-label">${escapeHtml(label)}</span>${arenaTraceIcons.down}</summary>
          <div class="arena-trace-item-body">${body}</div>
        </details>`;
      }).join('');
      const fetchRows = fetchBlocks.map((block, index) => {
        const url = block.url || 'link';
        const verb = block.status === 'running' ? 'Fetching' : 'Fetched';
        const body = contentBlockBodyMarkup(block, message);
        const link = block.url
          ? `<a class="arena-fetch-link" data-fetch-link href="${escapeHtml(block.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(block.url)}</a>`
          : `<span class="arena-search-label">${escapeHtml(url)}</span>`;
        return `<details class="arena-trace-item arena-fetch-item" data-content-block-id="${escapeHtml(block.id || `fetch-${index}`)}">
          <summary>${arenaTraceIcons.link}<span class="arena-fetch-verb">${verb}</span>${link}${arenaTraceIcons.down}</summary>
          <div class="arena-trace-item-body">${body}</div>
        </details>`;
      }).join('');
      return `<details class="arena-trace-group arena-search-group" data-content-block-id="arena-search-group" open>
        <summary>${arenaTraceIcons.right}${arenaTraceIcons.search}<span class="arena-group-label">${running ? 'Searching the web' : 'Searched the web'}</span></summary>
        <div class="arena-trace-list">${searchRows}${fetchRows}</div>
      </details>`;
    }

    function arenaCommandGroupMarkup(blocks, message) {
      if (!blocks.length) return '';
      const running = blocks.some(block => block.status === 'running');
      const count = blocks.length;
      const rows = blocks.map((block, index) => {
        const body = contentBlockBodyMarkup(block, message);
        const complete = block.status !== 'running';
        const statusIcon = complete ? (block.success === false ? arenaTraceIcons.error : arenaTraceIcons.check) : '';
        const duration = complete ? `<span class="arena-trace-duration">${escapeHtml(arenaDurationLabel(block.durationMs))}</span>` : '';
        return `<details class="arena-trace-item arena-command-item" data-content-block-id="${escapeHtml(block.id || `command-${index}`)}">
          <summary>${arenaTraceIcons.terminal}<span class="arena-command-copy"><span>${complete ? 'used' : 'using'}</span><strong>${escapeHtml(block.toolName || 'Bash')}</strong>${statusIcon}${duration}</span>${arenaTraceIcons.down}</summary>
          <div class="arena-trace-item-body">${body}</div>
        </details>`;
      }).join('');
      const label = running ? (count === 1 ? 'Running command' : 'Running commands') : (count === 1 ? 'Ran command' : 'Ran commands');
      return `<details class="arena-trace-group arena-command-group" data-content-block-id="arena-command-group" open>
        <summary>${arenaTraceIcons.right}${arenaTraceIcons.command}<span class="arena-group-label">${label}</span>${count > 1 ? `<span class="arena-group-count">${count}</span>` : ''}</summary>
        <div class="arena-trace-list">${rows}</div>
      </details>`;
    }

    function assistantContentBlocksInnerMarkup(message) {
      // Thinking and redacted-thinking blocks are protocol state, not message
      // content cards. Keep them for API round-tripping, but do not show them.
      const blocks = Array.isArray(message.contentBlocks)
        ? message.contentBlocks
            .filter(block => !['text', 'thinking', 'redacted_thinking'].includes(String(block.type || '').toLowerCase()))
            .map(block => ({ ...block }))
        : [];

      const searchBlocks = blocks.filter(block => String(block.type).toLowerCase() === 'search_execution');
      const fetchBlocks = blocks.filter(block => String(block.type).toLowerCase() === 'fetch_execution');
      const commandBlocks = blocks.filter(block => String(block.type).toLowerCase() === 'command_execution');
      const standardBlocks = blocks.filter(block => !['search_execution', 'fetch_execution', 'command_execution'].includes(String(block.type).toLowerCase()));
      const traceMarkup = `${arenaSearchGroupMarkup(searchBlocks, fetchBlocks, message)}${arenaCommandGroupMarkup(commandBlocks, message)}`;

      return traceMarkup + standardBlocks.map((block, blockIndex) => {
        const type = String(block.type || 'content').toLowerCase();
        const running = message.pending && block.status !== 'complete' && block.status !== 'stopped';
        const body = contentBlockBodyMarkup(block, message);
        const id = block.id || `${type}-${blockIndex}`;
        const label = contentBlockLabel(block, message);
        const isCommand = type === 'command_execution';
        const isSearch = type === 'search_execution';
        const isAgentTrace = isCommand || isSearch;
        const kind = (type === 'thinking' || isAgentTrace) ? '' : `<span class="content-block-kind">${escapeHtml(`${type}${running ? ' · live' : ''}`)}</span>`;
        const summary = `<span class="content-block-title">${escapeHtml(label)}</span>${kind}`;
        const className = `claude-content-block ${type === 'thinking' ? 'thinking-block' : isCommand ? 'command-block' : isSearch ? 'search-block' : 'data-block'}`;

        if (!body) {
          return `<div class="${className}" data-content-block-id="${escapeHtml(id)}"><div class="claude-content-block-static" role="status">${summary}</div></div>`;
        }
        return `
          <details class="${className}" data-content-block-id="${escapeHtml(id)}">
            <summary>${summary}<svg class="content-block-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" aria-hidden="true"><path d="m6 3.5 4.5 4.5L6 12.5" stroke-linecap="round" stroke-linejoin="round"/></svg></summary>
            <div class="content-block-body">${body}</div>
          </details>
        `;
      }).join('');
    }

    function assistantContentBlocksMarkup(message) {
      return `<div class="assistant-content-blocks" data-content-blocks>${assistantContentBlocksInnerMarkup(message)}</div>`;
    }

    function pendingAssistantContent(message) {
      return `<div class="streamed-markdown">${message.content ? renderMarkdown(message.content, { streaming: true }) : ''}</div>`;
    }

    function messageMarkup(message, index) {
      if (message.role === 'user') {
        if (state.editingIndex === index) {
          return `
            <article class="message-root message user editing" data-index="${index}">
              <div class="user-shell">
                <div class="message-edit-composer" role="group" aria-label="Edit message">
                  <textarea class="message-edit-input" data-edit-input="true" data-index="${index}" rows="1" aria-label="Edit message">${escapeHtml(state.editingDraft)}</textarea>
                  <div class="message-edit-actions">
                    <button type="button" class="message-edit-button" data-action="cancel-edit" data-index="${index}">Cancel</button>
                    <button type="button" class="primary-action message-edit-retry-button" data-action="submit-edit" data-index="${index}" aria-label="Save and retry" title="Save and retry">${svg.reload}</button>
                  </div>
                </div>
              </div>
            </article>
          `;
        }
        return `
          <article class="message-root" data-index="${index}">
            <div class="user-shell">
              <div class="user-bubble">${renderInlineMarkdown(message.content).replaceAll('\n', '<br>')}</div>
              <div class="action-bar" aria-label="User message actions">
                <button type="button" class="action-button" data-action="edit" data-index="${index}" aria-label="Edit" title="Edit">${svg.pencil}</button>
                <button type="button" class="action-button ${message.copied ? 'copied' : ''}" data-action="copy" data-index="${index}" aria-label="Copy" title="Copy">${copyIcon(message)}</button>
              </div>
            </div>
          </article>
        `;
      }

      const assistantIcon = message.pending
        ? svg.claudeWorking
        : svg.claudeStatic;
      const content = message.pending
        ? pendingAssistantContent(message)
        : renderMarkdown(message.content);
      const contentBlocks = assistantContentBlocksMarkup(message);
      const actions = message.pending ? '' : `
        <div class="action-bar" aria-label="Assistant message actions">
          <button type="button" class="action-button ${message.copied ? 'copied' : ''}" data-action="copy" data-index="${index}" aria-label="Copy" title="Copy">${copyIcon(message)}</button>
          <button type="button" class="action-button ${message.feedback === 'positive' ? 'active' : ''}" data-action="like" data-index="${index}" aria-label="Good response" title="Good response">${svg.thumbsUp}</button>
          <button type="button" class="action-button ${message.feedback === 'negative' ? 'active' : ''}" data-action="dislike" data-index="${index}" aria-label="Bad response" title="Bad response">${svg.thumbsDown}</button>
          <button type="button" class="action-button" data-action="reload" data-index="${index}" aria-label="Reload" title="Reload">${svg.reload}</button>
        </div>
      `;
      return `
        <article class="message-root" data-index="${index}">
          <div class="assistant-shell">
            <div class="assistant-message-row">
              <div class="assistant-icon-rail" data-state="${message.pending ? (message.content ? 'streaming' : 'thinking') : 'done'}" aria-hidden="true">${assistantIcon}</div>
              <div class="assistant-text">${contentBlocks}${content}</div>
            </div>
            ${actions}
          </div>
        </article>
      `;
    }

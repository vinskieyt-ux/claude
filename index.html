    function isViewportNearBottom(viewport, threshold = 140) {
      if (!viewport) return true;
      return viewport.scrollHeight - viewport.scrollTop - viewport.clientHeight < threshold;
    }

    function updateScrollBottomButtonVisibility() {
      const viewport = document.getElementById('viewport');
      const button = app.querySelector('.scroll-bottom-button');
      if (!viewport || !button) return;
      const shouldShow = !isViewportNearBottom(viewport, 120);
      button.classList.toggle('show', shouldShow);
      button.setAttribute('aria-hidden', shouldShow ? 'false' : 'true');
    }

    function scrollViewportToBottom({ smooth = false } = {}) {
      const viewport = document.getElementById('viewport');
      if (viewport) {
        viewport.scrollTo({ top: viewport.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
        requestAnimationFrame(updateScrollBottomButtonVisibility);
      }
    }

    const STREAM_RENDER_INTERVAL_MS = 100;

    function updateAssistantStreamingMessage(index, { force = false } = {}) {
      const message = state.messages[index];
      if (!message || !message.pending) return;

      // Network chunks can arrive much faster than the browser can paint. Batch
      // them so a growing code block is not parsed and rebuilt for every token.
      const now = performance.now();
      const elapsed = now - (message.streamPaintAt || 0);
      if (!force && elapsed < STREAM_RENDER_INTERVAL_MS) {
        if (!message.streamPaintTimer) {
          message.streamPaintTimer = setTimeout(() => {
            message.streamPaintTimer = null;
            updateAssistantStreamingMessage(index, { force: true });
          }, STREAM_RENDER_INTERVAL_MS - elapsed);
        }
        return;
      }

      message.streamPaintAt = now;
      const root = document.querySelector(`.message-root[data-index="${index}"]`);
      if (!root) return;

      const iconRail = root.querySelector('.assistant-icon-rail');
      if ((message.content || message.contentBlocks?.length) && iconRail?.dataset.state !== 'streaming') {
        iconRail.dataset.state = 'streaming';
      }

      const blocksEl = root.querySelector('[data-content-blocks]');
      if (blocksEl) {
        const openIds = new Set(
          Array.from(blocksEl.querySelectorAll('details[open][data-content-block-id]'))
            .map(details => details.dataset.contentBlockId)
        );
        blocksEl.innerHTML = assistantContentBlocksInnerMarkup(message);
        blocksEl.querySelectorAll('details[data-content-block-id]').forEach(details => {
          if (openIds.has(details.dataset.contentBlockId)) details.open = true;
        });
        blocksEl.querySelectorAll('[data-fetch-link]').forEach(link => {
          link.addEventListener('click', event => event.stopPropagation());
        });
      }

      const markdownEl = root.querySelector('.streamed-markdown');
      if (markdownEl) {
        // Streaming mode skips repeated syntax highlighting. The completed
        // response is rendered normally and receives highlighting once.
        markdownEl.innerHTML = message.content
          ? renderMarkdown(message.content, { streaming: true })
          : '';
        markdownEl.querySelectorAll('[data-action="copy-code"]').forEach(button => button.addEventListener('click', handleAction));
      }

      // Keep the old workspace behavior: streaming updates should not push the workspace/viewport down.
      updateScrollBottomButtonVisibility();
    }

    function render(options = {}) {
      const { keepFocus = true, scroll = false } = options;
      const active = document.activeElement;
      const inputWasFocused = active && active.id === 'composer-input';
      const cursor = inputWasFocused ? active.selectionStart : null;
      const previousViewport = document.getElementById('viewport');
      const previousScrollTop = previousViewport ? previousViewport.scrollTop : null;

      const pageMarkup = state.currentPage === 'chats' ? chatsPageMarkup() : state.currentPage === 'projects' ? projectsPageMarkup() : state.currentPage === 'artifacts' ? artifactsPageMarkup() : (state.messages.length ? chatStateMarkup() : emptyStateMarkup());
      app.innerHTML = pageMarkup + dialogMarkup();
      bindEvents();

      const input = document.getElementById('composer-input');
      if (input) {
        autoResize(input);
        if (keepFocus && (inputWasFocused || state.draft)) {
          input.focus({ preventScroll: true });
          const position = cursor ?? input.value.length;
          try { input.setSelectionRange(position, position); } catch {}
        }
      }

      if (scroll) {
        requestAnimationFrame(() => scrollViewportToBottom());
      } else if (previousScrollTop != null) {
        requestAnimationFrame(() => {
          const viewport = document.getElementById('viewport');
          if (viewport) {
            viewport.scrollTop = Math.min(previousScrollTop, viewport.scrollHeight);
            updateScrollBottomButtonVisibility();
          }
        });
      }
    }

    function bindAttachmentSubmenuEvents() {
      const picker = app.querySelector('.attachment-picker');
      if (!picker) return;
      const openSubmenu = (trigger) => {
        const kind = trigger.dataset.submenuTrigger;
        if (!kind) return;
        const pickerRect = picker.getBoundingClientRect();
        const triggerRect = trigger.getBoundingClientRect();
        picker.style.setProperty('--attachment-submenu-top', `${triggerRect.top - pickerRect.top}px`);
        picker.dataset.openSubmenu = kind;
        picker.querySelectorAll('[data-submenu-trigger]').forEach(item => {
          item.setAttribute('aria-expanded', item === trigger ? 'true' : 'false');
        });
      };
      picker.querySelectorAll('[data-submenu-trigger]').forEach(trigger => {
        trigger.addEventListener('mouseenter', () => openSubmenu(trigger));
        trigger.addEventListener('focus', () => openSubmenu(trigger));
      });
      picker.addEventListener('mouseleave', () => {
        if (!state.attachmentSubmenuOpen) {
          delete picker.dataset.openSubmenu;
          picker.querySelectorAll('[data-submenu-trigger]').forEach(item => item.setAttribute('aria-expanded', 'false'));
        }
      });
    }

    function bindEvents() {
      const input = document.getElementById('composer-input');
      const fileInput = document.getElementById('file-input');
      const composer = app.querySelector('.composer');
      const projectSearch = document.getElementById('project-search');

      if (projectSearch) {
        projectSearch.addEventListener('input', event => {
          state.projectSearch = event.target.value;
          render({ keepFocus: false });
          requestAnimationFrame(() => document.getElementById('project-search')?.focus({ preventScroll: true }));
        });
      }

      const artifactSearch = document.getElementById('artifact-search');
      if (artifactSearch) {
        artifactSearch.addEventListener('input', event => {
          state.artifactSearch = event.target.value;
          render({ keepFocus: false });
          requestAnimationFrame(() => document.getElementById('artifact-search')?.focus({ preventScroll: true }));
        });
      }

      const chatSearch = document.getElementById('chat-search');
      if (chatSearch) {
        chatSearch.addEventListener('input', event => {
          state.chatSearch = event.target.value;
          render({ keepFocus: false });
          requestAnimationFrame(() => document.getElementById('chat-search')?.focus({ preventScroll: true }));
        });
      }

      if (input) {
        input.addEventListener('input', event => {
          state.draft = event.target.value;
          autoResize(input);
          updatePrimaryButton();
        });
        input.addEventListener('keydown', event => {
          if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            if (state.draft.trim() && !state.isRunning) sendMessage();
          }
        });
        input.addEventListener('paste', event => {
          const pastedText = event.clipboardData?.getData('text/plain') || '';
          if (pastedText.length >= 4000) {
            event.preventDefault();
            addPastedTextAttachment(pastedText);
          }
        });
      }

      if (composer) {
        const hasFiles = event => Array.from(event.dataTransfer?.types || []).includes('Files');
        const preventFileDefault = event => {
          if (!hasFiles(event)) return false;
          event.preventDefault();
          event.stopPropagation();
          return true;
        };
        composer.addEventListener('dragenter', event => {
          if (preventFileDefault(event)) composer.classList.add('drag-over');
        });
        composer.addEventListener('dragover', event => {
          if (preventFileDefault(event)) composer.classList.add('drag-over');
        });
        composer.addEventListener('dragleave', event => {
          if (!composer.contains(event.relatedTarget)) composer.classList.remove('drag-over');
        });
        composer.addEventListener('drop', event => {
          if (!preventFileDefault(event)) return;
          composer.classList.remove('drag-over');
          addFiles(Array.from(event.dataTransfer?.files || []));
        });
      }

      app.querySelectorAll('[data-edit-input="true"]').forEach(editInput => {
        autoResizeEditInput(editInput);
        editInput.addEventListener('input', event => {
          state.editingDraft = event.target.value;
          autoResizeEditInput(event.target);
        });
        editInput.addEventListener('keydown', event => {
          if (event.key === 'Escape') {
            event.preventDefault();
            cancelEditMessage();
          }
          if (event.key === 'Enter' && (event.metaKey || event.ctrlKey)) {
            event.preventDefault();
            submitEditedMessage();
          }
        });
        requestAnimationFrame(() => {
          editInput.focus({ preventScroll: true });
          editInput.selectionStart = editInput.selectionEnd = editInput.value.length;
        });
      });

      if (fileInput) {
        fileInput.addEventListener('change', event => {
          addFiles(Array.from(event.target.files || []));
          event.target.value = '';
        });
      }

      app.querySelectorAll('[data-action]').forEach(element => {
        element.addEventListener('click', handleAction);
      });

      app.querySelectorAll('[data-fetch-link]').forEach(link => {
        link.addEventListener('click', event => event.stopPropagation());
      });

      app.querySelectorAll('[data-suggestion]').forEach(element => {
        const preview = () => previewSuggestionInComposer(element.dataset.suggestion);
        element.addEventListener('mouseenter', preview);
        element.addEventListener('focus', preview);
      });

      bindAttachmentSubmenuEvents();

      const viewport = document.getElementById('viewport');
      if (viewport) {
        viewport.addEventListener('scroll', updateScrollBottomButtonVisibility, { passive: true });
        requestAnimationFrame(updateScrollBottomButtonVisibility);
      }

      app.querySelectorAll('form[data-action="create-project-form"]').forEach(form => {
        form.addEventListener('submit', event => {
          event.preventDefault();
          const name = document.getElementById('project-name')?.value?.trim();
          state.currentPage = 'projects';
          setSidebarActive('projects');
          showToast(name ? `Project created: ${name}` : 'Project created');
          closeDialog();
        });
      });

      app.querySelectorAll('[data-model]').forEach(element => {
        element.addEventListener('click', event => {
          if (element.dataset.locked === 'true') {
            event.preventDefault();
            event.stopPropagation();
            state.menuOpen = false;
            state.effortMenuOpen = false;
            const name = element.dataset.modelName || CLAUDE_MODELS.find(m => m.id === element.dataset.model)?.name || 'Pro model';
            showToast(`${name} requires Pro`);
            render({ keepFocus: false });
            return;
          }
          state.model = element.dataset.model;
          state.menuOpen = false;
          state.effortMenuOpen = false;
          showToast(`${selectedModel().name} selected`);
          render({ keepFocus: false });
        });
      });
    }

    function updatePrimaryButton() {
      const old = app.querySelector('[data-action="primary"]');
      if (!old) return;
      const wrapper = document.createElement('div');
      wrapper.innerHTML = primaryActionMarkup().trim();
      const next = wrapper.firstElementChild;
      next.addEventListener('click', handleAction);
      old.replaceWith(next);
    }

    function autoResize(input) {
      input.style.height = 'auto';
      const maxHeight = input.closest('.composer-chat') ? 288 : 384;
      input.style.height = Math.min(input.scrollHeight, maxHeight) + 'px';
    }

    function autoResizeEditInput(input) {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 180) + 'px';
    }

    function handleAction(event) {
      const element = event.currentTarget;
      const action = element.dataset.action;

      if (action === 'copy-code') {
        event.preventDefault();
        event.stopPropagation();
        const code = element.closest('.claude-code-block')?.querySelector('.code-block-source')?.textContent || '';
        if (!code) return;
        const markCopied = () => {
          const original = element.innerHTML;
          element.classList.add('copied');
          element.innerHTML = `${svg.check}<span>Copied</span>`;
          setTimeout(() => {
            element.classList.remove('copied');
            element.innerHTML = original;
          }, 1600);
        };
        if (navigator.clipboard?.writeText) {
          navigator.clipboard.writeText(code).then(markCopied).catch(() => showToast('Copy failed'));
        } else {
          const area = document.createElement('textarea');
          area.value = code;
          area.setAttribute('readonly', '');
          area.style.position = 'fixed';
          area.style.opacity = '0';
          document.body.appendChild(area);
          area.select();
          try { document.execCommand('copy'); markCopied(); } catch { showToast('Copy failed'); }
          area.remove();
        }
        return;
      }

      if (!['toggle-model', 'effort-menu', 'set-effort', 'toggle-thinking'].includes(action)) state.menuOpen = false;
      if (action === 'filter-chats') {
        showToast('Filter by: All');
        return;
      }

      if (action === 'select-chats') {
        showToast('Select chats');
        return;
      }

      if (action === 'new-chat-page') {
        clearInterval(state.typingTimer);
        state.currentPage = 'chat';
        state.messages = [];
        state.draft = '';
        state.attachments = [];
        state.promptPanel = null;
        state.editingIndex = null;
        state.editingDraft = '';
        state.isRunning = false;
        state.isDictating = false;
        setSidebarActive('chats');
        showToast('New chat');
        render({ keepFocus: false });
        return;
      }

      if (action === 'sort-projects') {
        showToast('Sort by: Last updated');
        return;
      }

      if (action === 'new-artifact') {
        state.currentPage = 'chat';
        state.draft = 'Create a new artifact: ';
        setSidebarActive('artifacts');
        showToast('New artifact');
        render({ keepFocus: true });
        return;
      }

      if (!['toggle-attach', 'add-files', 'add-to-project', 'skills'].includes(action)) {
        state.attachmentMenuOpen = false;
        state.attachmentSubmenuOpen = null;
      }

      if (action === 'toggle-model') {
        state.menuOpen = !state.menuOpen;
        if (!state.menuOpen) state.effortMenuOpen = false;
        render({ keepFocus: false });
        return;
      }

      if (action === 'toggle-attach') {
        state.attachmentMenuOpen = !state.attachmentMenuOpen;
        state.attachmentSubmenuOpen = null;
        state.menuOpen = false;
        render({ keepFocus: false });
        return;
      }

      if (action === 'scroll-bottom') {
        scrollViewportToBottom({ smooth: true });
        return;
      }

      if (action === 'add-files') {
        const input = document.getElementById('file-input');
        if (input) input.click();
        return;
      }

      if (action === 'screenshot') {
        showToast('Screenshot picker opened');
        render({ keepFocus: false });
        return;
      }

      if (action === 'add-to-project') {
        event.preventDefault();
        event.stopPropagation();
        state.attachmentMenuOpen = true;
        state.attachmentSubmenuOpen = state.attachmentSubmenuOpen === 'project' ? null : 'project';
        render({ keepFocus: false });
        return;
      }

      if (action === 'start-project') {
        event.stopPropagation();
        state.attachmentMenuOpen = false;
        state.attachmentSubmenuOpen = null;
        state.activeDialog = 'create-project';
        render({ keepFocus: false });
        return;
      }

      if (action === 'skills') {
        event.preventDefault();
        event.stopPropagation();
        state.attachmentMenuOpen = true;
        state.attachmentSubmenuOpen = state.attachmentSubmenuOpen === 'skills' ? null : 'skills';
        render({ keepFocus: false });
        return;
      }

      if (action === 'skill-creator') {
        event.stopPropagation();
        state.attachmentMenuOpen = false;
        state.attachmentSubmenuOpen = null;
        state.activeDialog = 'manage-skills';
        showToast('skill-creator');
        render({ keepFocus: false });
        return;
      }

      if (action === 'manage-skills') {
        event.stopPropagation();
        state.attachmentMenuOpen = false;
        state.attachmentSubmenuOpen = null;
        state.activeDialog = 'manage-skills';
        render({ keepFocus: false });
        return;
      }

      if (action === 'browse-skills') {
        event.stopPropagation();
        state.attachmentMenuOpen = false;
        state.attachmentSubmenuOpen = null;
        state.activeDialog = 'browse-skills';
        render({ keepFocus: false });
        return;
      }

      if (action === 'toggle-web-search') {
        state.webSearchEnabled = !state.webSearchEnabled;
        showToast(`Web search ${state.webSearchEnabled ? 'on' : 'off'}`);
        render({ keepFocus: false });
        return;
      }

      if (action === 'close-dialog') {
        closeDialog();
        return;
      }

      if (action === 'open-browse-skills') {
        state.activeDialog = 'browse-skills';
        render({ keepFocus: false });
        return;
      }

      if (action === 'create-project-submit') {
        event.preventDefault();
        const name = document.getElementById('project-name')?.value?.trim();
        state.currentPage = 'projects';
        setSidebarActive('projects');
        showToast(name ? `Project created: ${name}` : 'Project created');
        closeDialog();
        return;
      }

      if (action === 'settings-placeholder') {
        showToast('Settings section');
        return;
      }

      if (action === 'install-skill') {
        event.stopPropagation();
        showToast(`${element.dataset.skill || 'Skill'} installed`);
        return;
      }

      if (action === 'close-suggestions') {
        state.promptPanel = null;
        render({ keepFocus: false });
        return;
      }

      if (action === 'use-suggestion') {
        const suggestion = element.dataset.suggestion || '';
        state.draft = suggestion;
        state.promptPanel = null;
        render({ keepFocus: true });
        return;
      }

      if (action === 'cancel-edit') {
        cancelEditMessage();
        return;
      }

      if (action === 'submit-edit') {
        submitEditedMessage();
        return;
      }

      if (action === 'primary') {
        const kind = primaryKind();
        if (kind === 'send') sendMessage();
        if (kind === 'dictate') startDictation();
        if (kind === 'stopDictation') stopDictation();
        if (kind === 'cancel') cancelResponse();
        return;
      }

      if (action === 'open-pasted-content') {
        state.activeDialog = 'pasted-content';
        state.activePastedAttachmentId = element.dataset.attachmentId;
        render({ keepFocus: false });
        return;
      }

      if (action === 'remove-attachment') {
        const removedId = element.dataset.attachmentId;
        state.attachments = state.attachments.filter(attachment => attachment.id !== removedId);
        if (state.activePastedAttachmentId === removedId) {
          state.activePastedAttachmentId = null;
          state.activeDialog = null;
        }
        render({ keepFocus: true });
        return;
      }

      if (action === 'mode-tab') {
        const mode = element.dataset.mode;
        if (PROMPT_SUGGESTIONS[mode]) {
          state.currentPage = 'chat';
          state.promptPanel = state.promptPanel === mode ? null : mode;
          render({ keepFocus: false });
        } else {
          state.promptPanel = null;
          showToast(`${mode} mode selected`);
          render({ keepFocus: false });
        }
        return;
      }

      if (action === 'upgrade-model') {
        event.stopPropagation();
        state.effortMenuOpen = false;
        showToast(`${element.dataset.modelName || 'This model'} requires Pro`);
        render({ keepFocus: false });
        return;
      }

      if (action === 'effort-menu') {
        event.preventDefault();
        event.stopPropagation();
        state.menuOpen = true;
        state.effortMenuOpen = !state.effortMenuOpen;
        render({ keepFocus: false });
        return;
      }

      if (action === 'set-effort') {
        event.stopPropagation();
        state.effort = element.dataset.effort || 'medium';
        state.menuOpen = true;
        state.effortMenuOpen = true;
        showToast(`Effort: ${state.effort}`);
        render({ keepFocus: false });
        return;
      }

      if (action === 'toggle-thinking') {
        event.stopPropagation();
        state.thinkingEnabled = !state.thinkingEnabled;
        state.menuOpen = true;
        state.effortMenuOpen = true;
        showToast(`Thinking ${state.thinkingEnabled ? 'on' : 'off'}`);
        render({ keepFocus: false });
        return;
      }

      if (action === 'more-options') {
        state.effortMenuOpen = false;
        showToast('More models');
        render({ keepFocus: false });
        return;
      }

      const index = Number(element.dataset.index);
      const message = state.messages[index];
      if (!message) return;

      if (action === 'copy') copyMessage(index);
      if (action === 'edit') editMessage(index);
      if (action === 'like') setFeedback(index, 'positive');
      if (action === 'dislike') setFeedback(index, 'negative');
      if (action === 'reload') reloadAssistant(index);
    }

    function addPastedTextAttachment(text) {
      const id = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
      state.attachments.push({
        id,
        name: 'Pasted Text',
        filename: `pasted-text-${timestamp}.txt`,
        type: 'text/plain',
        kind: 'pasted',
        content: text,
        lines: lineCountForText(text),
        size: new Blob([text], { type: 'text/plain' }).size,
      });
      state.attachmentMenuOpen = false;
      state.attachmentSubmenuOpen = null;
      showToast('Pasted text added');
      render({ keepFocus: true });
    }

    function addFiles(files) {
      if (!files.length) return;
      const incoming = files.slice(0, 6);
      state.attachmentMenuOpen = false;
      state.attachmentSubmenuOpen = null;
      incoming.forEach(file => {
        const id = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        const textLike = isTextLikeFile(file);
        const kind = file.type.startsWith('image/') ? 'image' : (textLike ? 'text' : 'file');
        const base = {
          id,
          name: file.name,
          filename: file.name,
          type: file.type || (textLike ? 'text/plain' : 'application/octet-stream'),
          kind,
          size: file.size,
        };
        if (kind === 'text') {
          base.content = '';
          base.lines = 0;
        }
        state.attachments.push(base);
        if (kind === 'image') {
          const reader = new FileReader();
          reader.onload = () => {
            const item = state.attachments.find(attachment => attachment.id === id);
            if (item) item.src = reader.result;
            render({ keepFocus: true });
          };
          reader.readAsDataURL(file);
        }
        if (kind === 'text') {
          const reader = new FileReader();
          reader.onload = () => {
            const item = state.attachments.find(attachment => attachment.id === id);
            if (item) {
              item.content = String(reader.result || '');
              item.lines = lineCountForText(item.content);
            }
            render({ keepFocus: true });
          };
          reader.onerror = () => {
            const item = state.attachments.find(attachment => attachment.id === id);
            if (item) {
              item.content = 'Could not read this text file preview.';
              item.lines = 1;
            }
            render({ keepFocus: true });
          };
          reader.readAsText(file);
        }
      });
      const textCount = incoming.filter(isTextLikeFile).length;
      showToast(textCount ? (textCount === 1 ? 'Text file preview added' : `${textCount} text file previews added`) : (incoming.length === 1 ? 'Attachment added' : `${incoming.length} attachments added`));
      render({ keepFocus: true });
    }

    function sendMessage() {
      const text = state.draft.trim();
      if (!text || state.isRunning) return;
      const attachments = state.attachments.map(attachment => ({ ...attachment }));
      const suffix = attachments.length ? `\n\n(${attachments.length} attachment${attachments.length === 1 ? '' : 's'})` : '';
      state.messages.push({ role: 'user', content: text + suffix, attachments });
      state.draft = '';
      state.attachments = [];
      state.promptPanel = null;
      state.editingIndex = null;
      state.editingDraft = '';
      state.isDictating = false;
      render({ keepFocus: false, scroll: true });
      beginAssistantResponse(null, text);
    }

    function startGuideConversation() {
      if (state.isRunning) return;
      state.messages.push({ role: 'user', content: 'Show me how to use Claude Design.' });
      state.draft = '';
      state.attachments = [];
      render({ keepFocus: false, scroll: true });
      beginAssistantResponse(null, 'Claude Design guide');
    }

    async function beginAssistantResponse(replaceIndex = null, prompt = '') {
      state.isRunning = true;
      clearInterval(state.typingTimer);
      if (state.responseAbortController) state.responseAbortController.abort();

      const index = replaceIndex ?? state.messages.length;
      const pending = {
        role: 'assistant',
        content: '',
        contentBlocks: [],
        anthropicContent: [],
        anthropicTurns: [],
        pending: true,
        thinkingRequested: state.thinkingEnabled,
        startedAt: Date.now(),
        sourcePrompt: prompt,
      };
      if (replaceIndex == null) state.messages.push(pending);
      else state.messages[index] = pending;
      render({ keepFocus: false, scroll: true });

      const controller = new AbortController();
      state.responseAbortController = controller;

      try {
        const result = await callAiandChatStreaming(index, controller.signal);
        const message = state.messages[index];
        if (!message || !message.pending) return;
        message.content = result.text;
        message.contentBlocks = result.blocks;
        message.anthropicContent = result.anthropicContent || message.anthropicContent || [];
        message.anthropicTurns = result.anthropicTurns || [{ role: 'assistant', content: message.anthropicContent }];
        message.activeBackendModel = result.model;
        if (message.streamPaintTimer) clearTimeout(message.streamPaintTimer);
        delete message.streamPaintTimer;
        delete message.streamPaintAt;
        message.pending = false;
        state.isRunning = false;
        render({ keepFocus: false, scroll: true });
      } catch (error) {
        if (error?.name === 'AbortError') return;
        console.error('All ai& API attempts failed:', error);
        const full = [
          `The ai& API proxy could not be reached.`,
          ``,
          `Start the included server, then refresh this page:`,
          ``,
          `Run: python3 server.py`,
          ``,
          `Server URL: http://127.0.0.1:8000`,
          ``,
          `Technical details: ${error?.message || error}`,
        ].join('\n');
        const message = state.messages[index];
        if (!message || !message.pending) return;
        message.content = full;
        message.contentBlocks = [];
        message.anthropicContent = [];
        message.anthropicTurns = [];
        if (message.streamPaintTimer) clearTimeout(message.streamPaintTimer);
        delete message.streamPaintTimer;
        delete message.streamPaintAt;
        message.pending = false;
        state.isRunning = false;
        render({ keepFocus: false, scroll: true });
        showToast('ai& API unavailable — start server.py');
      } finally {
        if (state.responseAbortController === controller) state.responseAbortController = null;
      }
    }

    function cancelResponse() {
      if (state.responseAbortController) {
        state.responseAbortController.abort();
        state.responseAbortController = null;
      }
      clearInterval(state.typingTimer);
      const last = state.messages[state.messages.length - 1];
      if (last && last.role === 'assistant' && last.pending) {
        if (last.streamPaintTimer) clearTimeout(last.streamPaintTimer);
        delete last.streamPaintTimer;
        delete last.streamPaintAt;
        const completedAt = Date.now();
        last.contentBlocks = (last.contentBlocks || []).map(block => ({
          ...block,
          status: 'stopped',
          completedAt,
          durationMs: Math.max(0, completedAt - (block.startedAt || last.startedAt || completedAt)),
        }));
        last.pending = false;
        last.content = (last.content || 'Response') + '\n\n[Response stopped]';
      }
      state.isRunning = false;
      showToast('Response stopped');
      render({ keepFocus: false });
    }

    function startDictation() {
      state.isDictating = true;
      showToast('Listening…');
      render({ keepFocus: false });
    }

    function stopDictation() {
      state.isDictating = false;
      state.draft = state.draft || 'Draft a thoughtful project brief in the Claude style.';
      showToast('Dictation stopped');
      render({ keepFocus: true });
    }

    async function copyMessage(index) {
      const message = state.messages[index];
      if (!message) return;
      try {
        await navigator.clipboard.writeText(message.content || '');
      } catch {}
      state.messages.forEach(item => { item.copied = false; });
      message.copied = true;
      showToast('Copied');
      render({ keepFocus: false });
      clearTimeout(state.copyTimer);
      state.copyTimer = setTimeout(() => {
        if (state.messages[index]) state.messages[index].copied = false;
        render({ keepFocus: false });
      }, 1200);
    }

    function editMessage(index) {
      const message = state.messages[index];
      if (!message || message.role !== 'user') return;
      clearInterval(state.typingTimer);
      state.isRunning = false;
      state.isDictating = false;
      state.editingIndex = index;
      state.editingDraft = message.content.replace(/\n\n\(\d+ attachments?\)$/i, '');
      showToast('Editing message');
      render({ keepFocus: false });
    }

    function cancelEditMessage() {
      state.editingIndex = null;
      state.editingDraft = '';
      render({ keepFocus: false });
    }

    function submitEditedMessage() {
      const index = state.editingIndex;
      if (index == null) return;
      const text = state.editingDraft.trim();
      if (!text) {
        showToast('Message cannot be empty');
        return;
      }
      const message = state.messages[index];
      if (!message || message.role !== 'user') return;
      clearInterval(state.typingTimer);
      message.content = text;
      state.messages = state.messages.slice(0, index + 1);
      state.editingIndex = null;
      state.editingDraft = '';
      state.isRunning = false;
      state.isDictating = false;
      render({ keepFocus: false, scroll: true });
      beginAssistantResponse(null, text);
    }

    function setFeedback(index, value) {
      const message = state.messages[index];
      if (!message) return;
      message.feedback = message.feedback === value ? null : value;
      showToast('Feedback recorded');
      render({ keepFocus: false });
    }

    function reloadAssistant(index) {
      const message = state.messages[index];
      if (!message || message.role !== 'assistant' || state.isRunning) return;
      const previousUser = [...state.messages.slice(0, index)].reverse().find(item => item.role === 'user');
      const prompt = message.sourcePrompt || previousUser?.content || '';
      showToast('Regenerating response');
      beginAssistantResponse(index, prompt);
    }


    function setSidebarActive(action) {
      document.querySelectorAll('.claude-sidebar .sidebar-row.active').forEach(row => row.classList.remove('active'));
      const targetAction = action === 'home' || action === 'new' ? 'chats' : action;
      const target = document.querySelector(`.claude-sidebar [data-sidebar-action="${targetAction}"]`);
      if (target?.classList.contains('sidebar-row')) target.classList.add('active');
    }

    document.addEventListener('click', event => {
      const sidebarTarget = event.target.closest('[data-sidebar-action]');
      if (!sidebarTarget) return;
      event.preventDefault();
      const action = sidebarTarget.dataset.sidebarAction;
      const label = sidebarTarget.getAttribute('aria-label') || sidebarTarget.textContent.trim().replace(/\s+/g, ' ');
      if (action === 'new' || action === 'home') {
        clearInterval(state.typingTimer);
        state.currentPage = 'chat';
        state.messages = [];
        state.draft = '';
        state.attachments = [];
        state.isRunning = false;
        state.isDictating = false;
        setSidebarActive('chats');
        showToast(action === 'new' ? 'New chat' : 'Home');
        render({ keepFocus: false });
        return;
      }
      if (action === 'chats') {
        clearInterval(state.typingTimer);
        state.currentPage = 'chats';
        state.chatSearch = '';
        state.isRunning = false;
        state.isDictating = false;
        setSidebarActive('chats');
        render({ keepFocus: false });
        return;
      }
      if (action === 'projects') {
        clearInterval(state.typingTimer);
        state.currentPage = 'projects';
        state.projectSearch = '';
        state.isRunning = false;
        state.isDictating = false;
        setSidebarActive('projects');
        render({ keepFocus: false });
        return;
      }
      if (action === 'artifacts') {
        clearInterval(state.typingTimer);
        state.currentPage = 'artifacts';
        state.artifactSearch = '';
        state.isRunning = false;
        state.isDictating = false;
        setSidebarActive('artifacts');
        render({ keepFocus: false });
        return;
      }
      if (action === 'design') {
        state.currentPage = 'chat';
        setSidebarActive('design');
        startGuideConversation();
        return;
      }
      showToast(label);
    });

    document.addEventListener('click', event => {
      let changed = false;
      if (state.menuOpen && !event.target.closest('.model-picker')) {
        state.menuOpen = false;
        state.effortMenuOpen = false;
        changed = true;
      }
      if (state.attachmentMenuOpen && !event.target.closest('.attachment-picker')) {
        state.attachmentMenuOpen = false;
        state.attachmentSubmenuOpen = null;
        changed = true;
      }
      if (changed) render({ keepFocus: false });
    });

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && (state.menuOpen || state.attachmentMenuOpen || state.activeDialog)) {
        state.menuOpen = false;
        state.effortMenuOpen = false;
        state.attachmentMenuOpen = false;
        state.attachmentSubmenuOpen = null;
        state.activeDialog = null;
        state.activePastedAttachmentId = null;
        render({ keepFocus: false });
      }
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'u') {
        event.preventDefault();
        const input = document.getElementById('file-input');
        if (input) input.click();
      }
    });

    async function checkAgentServer() {
      try {
        const response = await fetch(agentServerUrl('/api/health'), { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
      } catch {
        showToast('Start server.py to enable live ai& responses');
      }
    }

    render({ keepFocus: false });

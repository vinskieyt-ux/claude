<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude Clone</title>
  <style>
    :root {
      --bg: #F0ECE0;
      --surface: #ffffff;
      --surface-hover: rgba(26, 26, 24, 0.05);
      --border: #E5E0D6;
      --bubble: #E5E0D6;
      --text: #1a1a18;
      --muted: #5b5950;
      --muted-soft: #8a8780;
      --placeholder: #9a9893;
      --accent: #d97757;
      --accent-hover: #c6613f;
      --accent-blue: #6a9bcc;
      --accent-green: #788c5d;
      --font-claude-sans: "anthropicSans", "__styreneB_5d855b", "__styreneB_Fallback_5d855b", "Styrene B", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      --font-claude-serif: "anthropicSerif", "__tiempos_b6f14e", "__tiempos_Fallback_b6f14e", "Tiempos Text", Tiempos, Charter, "Iowan Old Style", ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      --font-claude-mono: "SFMono-Regular", "SF Mono", ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --dropdown-shadow: 0 18px 46px rgba(28, 24, 18, 0.10), 0 2px 10px rgba(28, 24, 18, 0.06);
      color-scheme: light;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #2b2a27;
        --surface: #1f1e1b;
        --surface-hover: rgba(255, 255, 255, 0.05);
        --border: #3d3a35;
        --bubble: #393937;
        --text: #eeeeee;
        --muted: #a3a098;
        --muted-soft: #a3a098;
        --placeholder: #9a9893;
        --dropdown-shadow: 0 18px 46px rgba(0, 0, 0, 0.34), 0 2px 10px rgba(0, 0, 0, 0.22);
        color-scheme: dark;
      }
    }

    * { box-sizing: border-box; }

    html,
    body,
    #app {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-claude-sans);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      color: inherit;
    }



    /* Claude-style left sidebar */
    :root {
      --sidebar-w: 18rem;
      --sidebar-bg: #f7f3ea;
      --sidebar-hover: rgba(26, 26, 24, .055);
      --sidebar-active: transparent;
      --sidebar-border: rgba(89, 82, 68, .18);
      --sidebar-muted: #777267;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --sidebar-bg: #24231f;
        --sidebar-hover: rgba(255, 255, 255, .055);
        --sidebar-active: transparent;
        --sidebar-border: rgba(255, 255, 255, .12);
        --sidebar-muted: #9f9b91;
      }
    }

    .claude-sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 35;
      width: var(--sidebar-w);
      height: 100dvh;
      color: var(--text);
      font-family: var(--font-claude-sans);
      pointer-events: auto;
    }

    .claude-sidebar nav {
      display: flex;
      height: 100%;
      width: 100%;
      flex-direction: column;
      border-right: 1px solid var(--sidebar-border);
      background: var(--sidebar-bg);
      box-shadow: 0 14px 36px rgba(32, 25, 15, .08);
      transition: background-color 35ms linear, border-color 35ms linear, box-shadow 35ms linear;
    }

    .sidebar-topbar {
      position: relative;
      display: flex;
      width: 100%;
      align-items: center;
      padding: 8px 12px 7px 16px;
      min-height: 48px;
    }

    .sidebar-logo {
      display: inline-flex;
      align-items: center;
      color: var(--text);
      text-decoration: none;
      min-width: 0;
    }

    .sidebar-logo svg {
      width: 82px;
      height: 20px;
      display: block;
    }

    .sidebar-logo-word {
      font-family: var(--font-claude-serif);
      font-size: 20px;
      line-height: 1;
      font-weight: 600;
      letter-spacing: -0.035em;
    }

    .sidebar-top-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .sidebar-icon-button {
      position: relative;
      display: inline-flex;
      width: 32px;
      height: 32px;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease, transform 120ms ease;
    }

    .sidebar-icon-button:hover {
      background: var(--sidebar-hover);
      color: var(--text);
    }

    .sidebar-icon-button:active,
    .sidebar-row:active,
    .sidebar-user-button:active {
      transform: scale(.99);
    }

    .sidebar-body {
      display: flex;
      min-height: 0;
      flex: 1 1 auto;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-top-list,
    .sidebar-section {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 0 8px;
    }

    .sidebar-top-list {
      padding-top: 7px;
      padding-bottom: 7px;
    }

    .sidebar-scroll {
      min-height: 0;
      flex: 1 1 auto;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-gutter: stable;
      padding-bottom: 10px;
      border-top: 1px solid transparent;
    }

    .sidebar-scroll::-webkit-scrollbar { width: 9px; }
    .sidebar-scroll::-webkit-scrollbar-thumb {
      background: color-mix(in srgb, var(--muted) 24%, transparent);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }


    .sidebar-real-layout {
      display: flex;
      flex: 1 1 auto;
      flex-direction: column;
      gap: 0;
      padding-bottom: 14px;
    }

    .sidebar-real-layout .sidebar-top-list {
      padding-top: 6px;
      padding-bottom: 8px;
    }

    .sidebar-real-layout .sidebar-section {
      margin-top: 0;
      padding-top: 0;
      padding-bottom: 0;
    }

    .sidebar-real-layout .sidebar-products {
      margin-top: 10px;
    }

    .sidebar-real-layout [aria-label="More"] {
      margin-top: 2px;
    }

    .sidebar-row {
      position: relative;
      display: flex;
      min-height: 32px;
      width: 100%;
      align-items: center;
      gap: 12px;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: var(--text);
      text-decoration: none;
      padding: 6px 10px 6px 14px;
      font-size: 14px;
      line-height: 1.15;
      cursor: pointer;
      outline-offset: -2px;
      transition: background 115ms ease, color 115ms ease;
    }

    .sidebar-row:hover,
    .sidebar-row:focus-visible {
      background: var(--sidebar-hover);
      color: var(--text);
    }


    /* Remove the white/default focus shadow that flashes when clicking sidebar buttons. */
    .claude-sidebar a,
    .claude-sidebar button {
      -webkit-tap-highlight-color: transparent;
    }

    .claude-sidebar .sidebar-row:focus,
    .claude-sidebar .sidebar-row:focus-visible,
    .claude-sidebar .sidebar-icon-button:focus,
    .claude-sidebar .sidebar-icon-button:focus-visible,
    .claude-sidebar .sidebar-user-button:focus,
    .claude-sidebar .sidebar-user-button:focus-visible {
      outline: none;
      box-shadow: none;
    }

    .claude-sidebar .sidebar-row:focus-visible,
    .claude-sidebar .sidebar-icon-button:focus-visible,
    .claude-sidebar .sidebar-user-button:focus-visible {
      background: var(--sidebar-hover);
    }

    .claude-sidebar .sidebar-row.active:focus-visible {
      background: var(--sidebar-active);
    }

    .sidebar-row.active {
      background: var(--sidebar-active);
    }


    .claude-sidebar .sidebar-row.active,
    .claude-sidebar .sidebar-row.active:focus,
    .claude-sidebar .sidebar-row.active:focus-visible {
      background: transparent;
      outline: none;
      border-color: transparent;
      box-shadow: none;
    }

    .claude-sidebar .sidebar-row.active:hover {
      background: var(--sidebar-hover);
      outline: none;
      border-color: transparent;
      box-shadow: none;
    }

    .sidebar-row .side-icon-wrap {
      display: inline-flex;
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }

    .side-icon {
      width: 18px;
      height: 18px;
      stroke-width: 1.9;
    }

    .actual-sidebar-svg {
      stroke-width: 1.8;
      vector-effect: non-scaling-stroke;
    }

    /* Purposeful Claude-style sidebar micro-interactions. Inline SVG lets each
       navigation icon animate itself instead of moving the whole row. */
    .claude-sidebar .side-icon,
    .claude-sidebar .side-icon path,
    .claude-sidebar .side-icon circle,
    .claude-sidebar .side-icon rect {
      transform-box: fill-box;
      transform-origin: center;
    }

    .claude-sidebar .side-icon {
      transition: color 140ms ease, transform 180ms cubic-bezier(.2,.8,.2,1);
      will-change: transform;
    }

    @keyframes side-icon-pop {
      0% { transform: scale(1); }
      45% { transform: scale(1.14); }
      100% { transform: scale(1); }
    }

    @keyframes side-chat-talk {
      0%, 100% { transform: translateY(0) rotate(0); }
      35% { transform: translateY(-1.2px) rotate(-3deg); }
      68% { transform: translateY(.4px) rotate(2deg); }
    }

    @keyframes side-project-lift {
      0%, 100% { transform: translateY(0); }
      45% { transform: translateY(-1.8px); }
    }

    @keyframes side-spark-twinkle {
      0%, 100% { transform: scale(1) rotate(0); opacity: 1; }
      45% { transform: scale(1.24) rotate(10deg); opacity: .78; }
    }

    @keyframes side-code-breathe {
      0%, 100% { transform: scaleX(1); }
      45% { transform: scaleX(1.16); }
    }

    @keyframes side-toolbox-open {
      0%, 100% { transform: translateY(0) rotate(0); }
      42% { transform: translateY(-1.4px) rotate(-2deg); }
      72% { transform: translateY(0) rotate(1deg); }
    }

    @keyframes side-palette-rock {
      0%, 100% { transform: rotate(0) scale(1); }
      35% { transform: rotate(-7deg) scale(1.06); }
      70% { transform: rotate(5deg) scale(1.04); }
    }

    @keyframes side-chevron-bounce {
      0%, 100% { transform: translateY(0); }
      45% { transform: translateY(2px); }
    }

    .sidebar-row[data-sidebar-action="chats"]:hover .side-icon,
    .sidebar-row[data-sidebar-action="chats"]:focus-visible .side-icon {
      animation: side-chat-talk 520ms cubic-bezier(.2,.8,.2,1);
    }

    .sidebar-row[data-sidebar-action="projects"]:hover .side-icon,
    .sidebar-row[data-sidebar-action="projects"]:focus-visible .side-icon {
      animation: side-project-lift 520ms cubic-bezier(.2,.8,.2,1);
    }

    .sidebar-row[data-sidebar-action="projects"]:hover .side-icon path:first-child {
      animation: side-project-lift 430ms ease-out 45ms;
    }

    .sidebar-row[data-sidebar-action="artifacts"]:hover .side-icon path,
    .sidebar-row[data-sidebar-action="artifacts"]:focus-visible .side-icon path {
      animation: side-spark-twinkle 620ms ease-in-out;
    }

    .sidebar-row[data-sidebar-action="artifacts"]:hover .side-icon path:nth-child(2) { animation-delay: 70ms; }
    .sidebar-row[data-sidebar-action="artifacts"]:hover .side-icon path:nth-child(3) { animation-delay: 135ms; }
    .sidebar-row[data-sidebar-action="artifacts"]:hover .side-icon path:nth-child(4) { animation-delay: 200ms; }

    .sidebar-row[data-sidebar-action="code"]:hover .side-icon,
    .sidebar-row[data-sidebar-action="code"]:focus-visible .side-icon {
      animation: side-code-breathe 480ms cubic-bezier(.2,.8,.2,1);
    }

    .sidebar-row[data-sidebar-action="customize"]:hover .side-icon,
    .sidebar-row[data-sidebar-action="customize"]:focus-visible .side-icon {
      animation: side-toolbox-open 560ms cubic-bezier(.2,.8,.2,1);
    }

    .sidebar-row[data-sidebar-action="design"]:hover .side-icon,
    .sidebar-row[data-sidebar-action="design"]:focus-visible .side-icon {
      animation: side-palette-rock 620ms cubic-bezier(.2,.8,.2,1);
    }

    .sidebar-row[data-sidebar-action="design"]:hover .side-icon circle {
      animation: side-icon-pop 480ms ease-out;
    }

    .sidebar-row[data-sidebar-action="more"]:hover .side-icon,
    .sidebar-row[data-sidebar-action="more"]:focus-visible .side-icon {
      animation: side-chevron-bounce 460ms ease-in-out;
    }

    .sidebar-icon-button:hover .side-icon,
    .sidebar-download:hover .side-icon {
      animation: side-icon-pop 420ms ease-out;
    }


    .sidebar-row-title {
      min-width: 0;
      flex: 1 1 auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar-shortcut {
      margin-right: -4px;
      color: var(--sidebar-muted);
      font-size: 12px;
      opacity: 0;
      transition: opacity 120ms ease;
      white-space: nowrap;
    }

    .sidebar-row:hover .sidebar-shortcut {
      opacity: 1;
    }

    .sidebar-new .side-icon-bubble {
      display: inline-flex;
      width: 22px;
      height: 22px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: color-mix(in srgb, var(--text) 13%, transparent);
      transition: transform 160ms ease, background 160ms ease;
    }

    .sidebar-new:hover .side-icon-bubble {
      background: color-mix(in srgb, var(--text) 22%, transparent);
      transform: rotate(-3deg) scale(1.08);
    }

    .sidebar-upgrade {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      border: 1px solid color-mix(in srgb, var(--accent) 44%, var(--border));
      border-radius: 999px;
      padding: 1px 7px 2px;
      color: var(--accent);
      font-size: 11px;
      line-height: 1.2;
      background: color-mix(in srgb, var(--accent) 7%, transparent);
    }

    .sidebar-row.has-badge {
      padding-right: 76px;
    }

    .sidebar-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 12px 0 3px;
      padding: 0 10px 2px 14px;
      color: var(--sidebar-muted);
      font-size: 12px;
      line-height: 1.2;
      user-select: none;
    }

    .sidebar-heading-label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
    }

    .sidebar-heading-chevron {
      opacity: 0;
      transition: opacity 120ms ease;
    }

    .sidebar-heading:hover .sidebar-heading-chevron {
      opacity: .7;
    }

    .sidebar-products ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-footer {
      border-top: 1px solid var(--sidebar-border);
      padding: 0;
    }

    .sidebar-user-button {
      display: flex;
      width: 100%;
      min-height: 64px;
      align-items: center;
      gap: 12px;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 11px 12px;
      cursor: pointer;
      text-align: left;
      transition: background 120ms ease;
    }

    .sidebar-user-button:hover {
      background: var(--sidebar-hover);
    }

    .sidebar-avatar {
      display: inline-flex;
      width: 36px;
      height: 36px;
      flex: 0 0 auto;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--text);
      color: var(--bg);
      font-weight: 700;
      font-size: 16px;
      border: 1px solid transparent;
    }

    .sidebar-user-meta {
      min-width: 0;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-user-name,
    .sidebar-user-plan {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar-user-name {
      font-size: 14px;
      font-weight: 600;
    }

    .sidebar-user-plan {
      color: var(--sidebar-muted);
      font-size: 12px;
      font-weight: 400;
    }

    .sidebar-download {
      position: relative;
      display: inline-flex;
      width: 32px;
      height: 32px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--sidebar-border);
      border-radius: 9px;
      color: var(--muted);
      flex: 0 0 auto;
    }

    .sidebar-download::after {
      content: "";
      position: absolute;
      top: -3px;
      right: -3px;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent);
    }

    .sidebar-double-chevron {
      width: 14px;
      height: 14px;
      flex: 0 0 auto;
      color: var(--muted);
    }

    #app.app {
      margin-left: var(--sidebar-w);
      width: calc(100% - var(--sidebar-w));
      overflow: hidden;
    }

    @media (max-width: 900px) {
      .claude-sidebar {
        display: none;
      }
      #app.app {
        margin-left: 0;
        width: 100%;
      }
    }

    .app {
      display: flex;
      height: 100%;
      flex-direction: column;
      align-items: stretch;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-claude-sans);
    }

    .empty-state {
      display: flex;
      flex: 1 1 auto;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
    }

    .empty-shell {
      width: 100%;
      max-width: 672px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 20px;
    }

    .headline {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text);
      font-size: 30px;
      line-height: 1.14;
      font-weight: 400;
      letter-spacing: -0.035em;
      text-align: center;
    }

    .sparkle {
      width: 28px;
      height: 28px;
      color: var(--accent);
      fill: var(--accent);
      flex: 0 0 auto;
    }

    .composer {
      position: relative;
      z-index: 1;
      display: flex;
      width: 100%;
      flex-direction: column;
      align-items: stretch;
      gap: 12px;
      border: 1px solid transparent;
      border-radius: 20px;
      background: var(--surface);
      padding: 14px;
      box-shadow:
        0 0.25rem 1.25rem rgba(0, 0, 0, .035),
        0 0 0 .5px color-mix(in srgb, var(--border) 55%, transparent);
      cursor: text;
      transition: background-color 200ms ease, border-color 200ms ease, box-shadow 200ms ease, opacity 200ms ease;
    }

    .composer:hover {
      box-shadow:
        0 0.25rem 1.25rem rgba(0, 0, 0, .035),
        0 0 0 .5px color-mix(in srgb, var(--border) 82%, transparent);
    }

    .composer:focus-within {
      box-shadow:
        0 0.25rem 1.25rem rgba(0, 0, 0, .075),
        0 0 0 .5px color-mix(in srgb, var(--border) 82%, transparent);
    }

    .composer.drag-over {
      border-color: color-mix(in srgb, var(--accent) 46%, var(--border));
      background: color-mix(in srgb, var(--accent) 5%, var(--surface));
      box-shadow:
        0 0.35rem 1.35rem rgba(0, 0, 0, .09),
        0 0 0 2px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    @media (prefers-color-scheme: dark) {
      .composer {
        box-shadow:
          0 0.25rem 1.25rem rgba(0, 0, 0, .35),
          0 0 0 .5px color-mix(in srgb, var(--border) 70%, transparent);
      }
    }

    .composer-input {
      display: block;
      width: 100%;
      min-height: calc(2lh + 6px);
      max-height: 384px;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      padding: 6px 6px 0;
      font-family: var(--font-claude-sans);
      font-size: 17px;
      line-height: 1.45;
      overflow-y: auto;
      overflow-wrap: anywhere;
      transition: opacity 200ms ease;
    }

    .composer-input::placeholder {
      color: var(--placeholder);
      white-space: nowrap;
    }

    .composer-toolbar {
      position: relative;
      display: flex;
      width: 100%;
      min-height: 32px;
      align-items: center;
      gap: 8px;
    }


    /* Chat viewport uses the old compact composer; home keeps the newer Claude-style composer. */
    .composer-chat {
      display: flex;
      width: 100%;
      flex-direction: column;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface);
      padding: 12px 14px 10px;
      box-shadow: none;
      cursor: text;
    }

    .composer-chat:hover,
    .composer-chat:focus-within {
      box-shadow: none;
    }

    .composer-chat .composer-input {
      min-height: 24px;
      max-height: 288px;
      padding: 0;
      font-size: 16px;
      line-height: 1.5;
      overflow-y: auto;
      transition: none;
    }

    .composer-chat .composer-input::placeholder {
      color: var(--placeholder);
      white-space: normal;
    }

    .composer-chat .composer-toolbar {
      display: flex;
      width: 100%;
      min-height: 0;
      align-items: center;
      gap: 8px;
    }

    .composer-chat .composer-icon-button {
      border-radius: 6px;
      margin-left: 0;
    }

    .composer-chat .primary-action {
      border-radius: 6px;
    }

    .composer-chat .toolbar-right {
      gap: 4px;
    }

    .composer-chat .model-trigger {
      height: 32px;
      min-width: 0;
      justify-content: center;
      gap: 4px;
      border-radius: 6px;
      padding: 0 10px;
    }

    .composer-chat .model-trigger-effort {
      display: none;
    }

    .chat-composer-footer {
      padding: 12px 16px 8px;
    }

    .toolbar-left {
      position: relative;

      white-space: pre-wrap;
      word-break: break-word;
      font-family: var(--font-claude-mono);
      font-size: 12px;
      line-height: 1.5;
    }

    /* Raw Arena Agent Mode trace groups supplied by the user: a top-level
       expandable action with indented, individually expandable tool rows. */
    .arena-trace-group,
    .arena-trace-item {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-claude-sans);
    }

    .arena-trace-group > summary,
    .arena-trace-item > summary {
      display: flex;
      width: 100%;
      align-items: center;
      gap: 6px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      list-style: none;
      user-select: none;
    }

    .arena-trace-group > summary::-webkit-details-marker,
    .arena-trace-item > summary::-webkit-details-marker { display: none; }
    .arena-trace-group > summary::marker,
    .arena-trace-item > summary::marker { content: ""; }

    .arena-trace-group > summary {
      min-height: 24px;
      padding: 2px 0;
      font-size: 13px;
      line-height: 1;
    }

    .arena-trace-item > summary {
      min-height: 22px;
      padding: 1px 0;
      font-size: 13px;
      line-height: 16px;
    }

    .arena-trace-group > summary:hover,
    .arena-trace-item > summary:hover,
    .arena-trace-group > summary:focus-visible,
    .arena-trace-item > summary:focus-visible {
      color: var(--text);
      outline: none;
    }

    .arena-trace-icon {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      color: var(--muted-soft);
      stroke-width: 1.5;
    }

    .arena-group-chevron,
    .arena-item-chevron {
      width: 12px;
      height: 12px;
      flex: 0 0 12px;
      color: var(--muted-soft);
      stroke-width: 1.5;
      transition: transform 180ms ease;
    }

    .arena-trace-group[open] > summary .arena-group-chevron { transform: rotate(90deg); }
    .arena-trace-item[open] > summary .arena-item-chevron { transform: rotate(180deg); }

    .arena-group-label {
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }

    .arena-group-count {
      color: var(--muted-soft);
      font-size: 13px;
    }

    .arena-trace-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 4px 0 2px 22px;
    }

    .arena-search-label {
      min-width: 0;
      flex: 0 1 auto;
      overflow: hidden;
      color: var(--muted-soft);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .arena-search-item .arena-item-chevron {
      margin-left: 0;
    }

    .arena-command-copy {
      display: inline-flex;
      min-width: 0;
      align-items: center;
      gap: 4px;
      color: var(--muted-soft);
    }

    .arena-command-copy strong {
      color: var(--muted);
      font-weight: 500;
    }

    .arena-trace-check,
    .arena-trace-error {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      stroke-width: 1.8;
    }

    .arena-trace-check { color: #4f9a68; }
    .arena-trace-error { color: #c85f52; }

    .arena-trace-duration {
      color: var(--muted-soft);
      font-family: var(--font-claude-mono);
      font-size: 10px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .arena-trace-item-body {
      padding: 5px 0 2px 22px;
    }

    .assistant-text .arena-trace-item-body pre.command-output-data,
    .assistant-text .arena-trace-item-body pre.search-output-data,
    .assistant-text .arena-trace-item-body pre.fetch-output-data {
      max-height: 360px;
      margin: 0;
      overflow: auto;
      border: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
      border-radius: 8px;
      padding: 10px 12px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.55;
    }

    .assistant-text .arena-trace-item-body pre.command-output-data {
      background: #292c34;
      color: #f2f2ef;
      font-family: var(--font-claude-mono);
      scrollbar-color: #626670 transparent;
    }

    .assistant-text .arena-trace-item-body pre.search-output-data,
    .assistant-text .arena-trace-item-body pre.fetch-output-data {
      background: color-mix(in srgb, var(--surface) 72%, var(--bg));
      color: var(--text);
      font-family: var(--font-claude-sans);
      font-size: 12.5px;
      line-height: 1.6;
    }

    .arena-fetch-verb {
      flex: 0 0 auto;
      color: var(--muted-soft);
    }

    .arena-fetch-link {
      min-width: 0;
      max-width: min(100%, 520px);
      overflow: hidden;
      color: color-mix(in srgb, var(--accent-blue) 78%, var(--text));
      text-decoration: none;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .arena-fetch-link:hover,
    .arena-fetch-link:focus-visible {
      text-decoration: underline;
      outline: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .content-block-chevron,
      .arena-group-chevron,
      .arena-item-chevron {
        transition: none;
      }
    }

    .action-bar {
      display: flex;
      align-items: center;
      gap: 2px;
      opacity: 0;
      transition: opacity 150ms ease;
      pointer-events: none;
    }

    .message-root:hover .action-bar,
    .message-root:focus-within .action-bar {
      opacity: 1;
      pointer-events: auto;
    }

    .user-shell .action-bar {
      margin-top: -1px;
    }

    .assistant-shell .action-bar {
      margin-top: 8px;
      margin-left: 38px;
    }

    .action-button {
      display: flex;
      width: 32px;
      height: 32px;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      color: var(--muted);
      transition: color 150ms ease, background 150ms ease, transform 120ms ease;
    }

    .action-button:hover,
    .action-button.active {
      background: var(--surface-hover);
      color: var(--text);
    }

    .action-button.copied {
      color: var(--accent);
    }

    .viewport-footer {
      position: relative;
      z-index: 10;
      flex: 0 0 auto;
      margin-left: auto;
      margin-right: auto;
      width: 100%;
      max-width: 768px;
      background: linear-gradient(to bottom, rgba(240,236,224,0), rgba(240,236,224,.88) 28%, var(--bg) 62%);
      padding: 12px 16px 8px;
    }


    .scroll-bottom-button {
      position: absolute;
      top: -28px;
      left: 50%;
      z-index: 12;
      display: inline-flex;
      width: 36px;
      height: 36px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: color-mix(in srgb, var(--surface) 80%, transparent);
      color: var(--text);
      padding: 4px;
      box-shadow: 0 4px 12px rgba(30, 25, 16, .12);
      backdrop-filter: blur(8px);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(4px);
      transition: opacity 180ms ease, transform 180ms ease, background 120ms ease, box-shadow 120ms ease;
    }

    .scroll-bottom-button.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .scroll-bottom-button:hover {
      background: var(--surface);
      box-shadow: 0 7px 18px rgba(30, 25, 16, .16);
    }

    .scroll-bottom-button svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    @media (prefers-color-scheme: dark) {
      .scroll-bottom-button {
        background: color-mix(in srgb, var(--surface) 84%, transparent);
        box-shadow: 0 6px 18px rgba(0, 0, 0, .3);
      }
    }

    @media (prefers-color-scheme: dark) {
      .viewport-footer {
        background: linear-gradient(to bottom, rgba(43,42,39,0), rgba(43,42,39,.88) 28%, var(--bg) 62%);
      }
    }

    .disclaimer {
      margin: 0;
      padding-top: 8px;
      text-align: center;
      color: var(--muted-soft);
      font-size: 12px;
      line-height: 1.35;
      font-family: var(--font-claude-sans);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 60;
      transform: translateX(-50%) translateY(10px);
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      padding: 8px 13px;
      box-shadow: var(--dropdown-shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity 170ms ease, transform 170ms ease;
      font-size: 13px;
      font-family: var(--font-claude-sans);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }



    /* Dialogs opened from the + menu */
    .dialog-layer {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(20, 18, 14, .26);
      backdrop-filter: blur(2px);
      font-family: var(--font-claude-sans);
    }

    .claude-dialog {
      width: min(calc(100vw - 32px), 960px);
      max-height: min(calc(100vh - 32px), 720px);
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--border) 85%, transparent);
      border-radius: 18px;
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 26px 90px rgba(36, 28, 15, .18), 0 7px 24px rgba(36, 28, 15, .08);
    }

    .claude-dialog button,
    .claude-dialog input,
    .claude-dialog textarea {
      font-family: inherit;
    }

    .pasted-dialog {
      width: min(calc(100vw - 32px), 768px);
      max-height: min(calc(100dvh - 32px), 760px);
      padding: 22px 24px 24px;
      background: var(--surface);
    }

    .pasted-dialog-inner {
      display: flex;
      min-height: 0;
      flex-direction: column;
      gap: 10px;
    }

    .pasted-dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .pasted-dialog-title {
      margin: 0;
      min-width: 0;
      color: var(--text);
      font-size: 20px;
      line-height: 1.25;
      font-weight: 700;
      letter-spacing: -0.02em;
      overflow-wrap: anywhere;
    }

    .pasted-dialog-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
      margin: 0 0 4px;
      color: var(--muted-soft);
      font-size: 12px;
      line-height: 1.35;
    }

    .pasted-dialog-dot {
      opacity: .55;
    }

    .pasted-content-box {
      max-height: min(70vh, 560px);
      overflow-y: auto;
      border: .5px solid color-mix(in srgb, var(--border) 88%, var(--muted));
      border-radius: 10px;
      background: color-mix(in srgb, var(--bg) 42%, var(--surface));
      box-shadow: 0 1px 2px rgba(0,0,0,.05);
      color: var(--text);
      padding: 16px;
      font-family: var(--font-claude-mono);
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    @media (max-width: 560px) {
      .pasted-dialog {
        padding: 18px;
      }
    }

    .project-dialog {
      width: min(calc(100vw - 32px), 520px);
      max-height: min(calc(100dvh - 32px), 680px);
      overflow-y: auto;
    }

    .dialog-pad {
      padding: 24px;
    }

    .dialog-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
    }

    .dialog-title {
      margin: 0;
      min-width: 0;
      flex: 1 1 auto;
      color: var(--text);
      font-size: 20px;
      line-height: 1.25;
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .dialog-close {
      display: inline-flex;
      width: 32px;
      height: 32px;
      flex: 0 0 auto;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease;
    }

    .dialog-close:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .project-help {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 18px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: color-mix(in srgb, var(--bg) 50%, var(--surface));
      padding: 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .project-help strong {
      display: block;
      color: var(--text);
      font-weight: 650;
    }

    .dialog-field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-top: 16px;
    }

    .dialog-field label {
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
    }

    .dialog-input,
    .dialog-textarea,
    .dialog-search {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 10px;
      background: color-mix(in srgb, var(--bg) 42%, var(--surface));
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--border) 82%, transparent);
      color: var(--text);
      outline: none;
      transition: box-shadow 120ms ease, background 120ms ease;
    }

    .dialog-input,
    .dialog-search {
      height: 38px;
      padding: 0 12px;
    }

    .dialog-textarea {
      min-height: 92px;
      resize: vertical;
      padding: 10px 12px;
      line-height: 1.4;
    }

    .dialog-input:focus,
    .dialog-textarea:focus,
    .dialog-search:focus {
      box-shadow: inset 0 0 0 1.5px color-mix(in srgb, var(--accent) 55%, var(--border));
      background: var(--surface);
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    .dialog-button {
      display: inline-flex;
      min-height: 36px;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      border-radius: 9px;
      padding: 0 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 560;
      transition: background 120ms ease, color 120ms ease, transform 120ms ease;
    }

    .dialog-button:active {
      transform: translateY(1px);
    }

    .dialog-button.secondary {
      background: color-mix(in srgb, var(--bg) 50%, var(--surface));
      color: var(--text);
      box-shadow: inset 0 0 0 1px var(--border);
    }

    .dialog-button.secondary:hover {
      background: var(--surface-hover);
    }

    .dialog-button.primary {
      background: var(--accent);
      color: #fff;
    }

    .dialog-button.primary:hover {
      background: var(--accent-hover);
    }

    .settings-dialog,
    .directory-dialog {
      display: flex;
      height: min(calc(100vh - 32px), 720px);
    }

    .settings-side {
      display: flex;
      width: 192px;
      flex: 0 0 192px;
      flex-direction: column;
      gap: 10px;
      border-right: 1px solid var(--border);
      background: color-mix(in srgb, var(--bg) 45%, var(--surface));
      padding: 14px 12px;
    }

    .settings-search-wrap {
      position: relative;
    }

    .settings-search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      width: 16px;
      height: 16px;
      color: var(--muted);
      transform: translateY(-50%);
    }

    .settings-search-wrap .dialog-search {
      height: 34px;
      padding-left: 33px;
      font-size: 14px;
    }

    .settings-nav-scroll {
      min-height: 0;
      overflow-y: auto;
      padding-bottom: 10px;
    }

    .settings-nav-caption {
      padding: 12px 9px 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .settings-nav-item {
      display: flex;
      width: 100%;
      height: 34px;
      align-items: center;
      gap: 9px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      padding: 0 9px;
      cursor: pointer;
      font-size: 14px;
      text-align: left;
      transition: background 120ms ease, color 120ms ease;
    }

    .settings-nav-item:hover,
    .settings-nav-item.active {
      background: var(--surface-hover);
      color: var(--text);
    }

    .settings-nav-item svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
    }

    .dialog-main {
      position: relative;
      display: flex;
      min-width: 0;
      flex: 1 1 auto;
      flex-direction: column;
      background: var(--surface);
    }

    .dialog-main-header {
      display: flex;
      min-height: 58px;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid transparent;
      padding: 14px 18px 10px;
    }

    .dialog-main-title {
      margin: 0;
      min-width: 0;
      flex: 1 1 auto;
      color: var(--text);
      font-size: 20px;
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .dialog-main-body {
      min-height: 0;
      overflow-y: auto;
      padding: 0 18px 18px;
    }

    .skills-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 14px;
    }

    .skills-table th {
      height: 36px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-align: left;
      padding: 0 12px;
    }

    .skills-table td {
      height: 44px;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 72%, transparent);
      padding: 0 12px;
      color: var(--text);
      vertical-align: middle;
    }

    .skills-table tr:hover td {
      background: var(--surface-hover);
    }

    .skill-name-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .skill-icon-mini {
      display: inline-flex;
      width: 22px;
      height: 22px;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      color: var(--accent);
      flex: 0 0 auto;
    }

    .directory-dialog {
      width: min(calc(100vw - 32px), 1024px);
      max-height: min(calc(100vh - 80px), 896px);
    }

    .directory-side {
      width: 200px;
      flex: 0 0 200px;
      padding: 70px 20px 20px 24px;
    }

    .directory-tab {
      display: flex;
      width: 100%;
      height: 36px;
      align-items: center;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: var(--muted);
      padding: 0 10px;
      cursor: pointer;
      font-size: 14px;
      text-align: left;
    }

    .directory-tab.active,
    .directory-tab:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .directory-search-row {
      display: flex;
      gap: 10px;
      margin: 0 0 16px;
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding-bottom: 18px;
    }

    .skill-card {
      display: flex;
      min-height: 150px;
      flex-direction: column;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: color-mix(in srgb, var(--bg) 26%, var(--surface));
      padding: 14px;
      text-align: left;
      transition: border-color 120ms ease, box-shadow 120ms ease, transform 120ms ease;
    }

    .skill-card:hover {
      border-color: color-mix(in srgb, var(--muted) 38%, var(--border));
      box-shadow: 0 5px 18px rgba(35, 27, 15, .06);
      transform: translateY(-1px);
    }

    .skill-card-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .skill-card-name {
      min-width: 0;
      flex: 1 1 auto;
      color: var(--text);
      font-size: 14px;
      font-weight: 650;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .skill-card-meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .skill-install {
      display: inline-flex;
      width: 32px;
      height: 32px;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: background 120ms ease;
    }

    .skill-install:hover {
      background: var(--surface-hover);
    }

    .skill-desc {
      margin: 0;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 12px;
      line-height: 1.35;
    }

    @media (max-width: 760px) {
      .settings-dialog,
      .directory-dialog {
        height: calc(100dvh - 16px);
        width: calc(100vw - 16px);
        flex-direction: column;
      }
      .settings-side,
      .directory-side {
        width: 100%;
        flex: 0 0 auto;
        border-right: 0;
        border-bottom: 1px solid var(--border);
        padding: 12px;
      }
      .settings-nav-scroll,
      .directory-side nav {
        display: flex;
        overflow-x: auto;
        gap: 4px;
      }
      .settings-nav-caption {
        display: none;
      }
      .settings-nav-item,
      .directory-tab {
        width: auto;
        flex: 0 0 auto;
      }
      .skills-grid {
        grid-template-columns: 1fr;
      }
    }



    /* Projects page */
    .projects-page {
      display: flex;
      height: 100%;
      min-height: 0;
      flex: 1 1 auto;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-claude-sans);
    }

    .projects-sticky {
      position: sticky;
      top: 0;
      z-index: 15;
      background: var(--bg);
    }

    .projects-header {
      display: flex;
      height: 64px;
      width: min(896px, 100%);
      margin: 0 auto;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      padding: 0 32px 0;
    }

    .projects-title {
      margin: 0;
      color: var(--text);
      font-family: var(--font-claude-serif);
      font-size: 26px;
      line-height: 1.1;
      font-weight: 500;
      letter-spacing: -0.035em;
    }

    .projects-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .projects-button {
      position: relative;
      display: inline-flex;
      min-height: 36px;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 0;
      border-radius: 9px;
      padding: 0 13px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 560;
      transition: background 120ms ease, color 120ms ease, transform 120ms ease, box-shadow 120ms ease;
    }

    .projects-button:active {
      transform: translateY(1px);
    }

    .projects-button.secondary {
      background: color-mix(in srgb, var(--bg) 48%, var(--surface));
      color: var(--text);
      box-shadow: inset 0 0 0 1px var(--border);
    }

    .projects-button.secondary:hover {
      background: var(--surface-hover);
    }

    .projects-button.primary {
      background: var(--accent);
      color: #fff;
    }

    .projects-button.primary:hover {
      background: var(--accent-hover);
    }

    .projects-search-wrap {
      position: relative;
      width: min(896px, 100%);
      margin: 0 auto;
      padding: 18px 32px 24px;
    }

    .projects-mobile-title {
      display: none;
      margin: 0 0 12px;
      color: var(--muted);
      font-family: var(--font-claude-serif);
      font-size: 22px;
      font-weight: 500;
      text-align: center;
    }

    .projects-search {
      position: relative;
      display: flex;
      width: 100%;
      height: 40px;
      align-items: center;
      gap: 8px;
      border-radius: 10px;
      background: color-mix(in srgb, var(--bg) 45%, var(--surface));
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--border) 88%, transparent);
      padding: 0 12px;
      color: var(--muted);
      transition: box-shadow 120ms ease, background 120ms ease;
    }

    .projects-search:focus-within {
      background: var(--surface);
      box-shadow: inset 0 0 0 1.5px color-mix(in srgb, var(--accent) 48%, var(--border));
    }

    .projects-search svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }

    .projects-search input {
      min-width: 0;
      flex: 1 1 auto;
      height: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      padding: 0;
      font-size: 14px;
    }

    .projects-search input::placeholder {
      color: var(--muted);
    }

    .projects-fade {
      position: absolute;
      inset-inline: 0;
      bottom: -32px;
      height: 32px;
      pointer-events: none;
      background: linear-gradient(to bottom, var(--bg), color-mix(in srgb, var(--bg) 0%, transparent));
      opacity: .7;
    }

    .projects-main {
      width: min(896px, 100%);
      margin: 4px auto 0;
      padding: 0 32px 40px;
      flex: 1 0 auto;
    }

    .projects-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 420px;
      padding: 48px 16px;
      text-align: center;
      color: var(--muted);
    }

    .projects-empty svg.projects-picto {
      width: 96px;
      height: 96px;
      color: var(--text);
      opacity: .9;
    }


    .artifacts-page .projects-empty svg.projects-picto {
      opacity: .92;
    }

    .artifacts-page .artifact-spark {
      fill: var(--accent);
      opacity: .9;
    }


    .chats-page .projects-search-wrap {
      padding-bottom: 8px;
    }

    .chats-main {
      width: min(896px, 100%);
      margin: 8px auto 0;
      padding: 0 32px 40px;
      flex: 1 0 auto;
    }

    .chats-table-shell {
      min-width: 0;
      padding-bottom: 24px;
    }

    .chats-table-scroll {
      margin: -8px;
      overflow-x: auto;
      padding: 8px;
    }

    .chats-table {
      width: 100%;
      min-width: 200px;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
      color: var(--text);
      font-family: var(--font-claude-sans);
      font-size: 14px;
    }

    .chats-table th {
      height: 0;
      padding: 0;
      line-height: 0;
      overflow: hidden;
    }

    .chats-table td {
      border-bottom: 1px solid color-mix(in srgb, var(--border) 72%, transparent);
      padding: 0 12px;
    }

    .chats-empty-cell {
      border-bottom: 0 !important;
      padding: 48px 12px 0 !important;
      text-align: center;
    }

    .chats-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 360px;
      padding: 12px 16px 0;
      color: var(--muted);
      white-space: normal;
    }

    .chats-empty svg.chats-picto {
      width: 96px;
      height: 96px;
      color: var(--text);
      opacity: .9;
      flex-shrink: 0;
    }

    .chats-empty h3 {
      margin: 0;
      max-width: 340px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.35;
      font-weight: 560;
    }

    .chats-empty p {
      margin: 0;
      max-width: 340px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 760px) {
      .chats-main {
        padding-left: 16px;
        padding-right: 16px;
      }
      .chats-page .projects-button.secondary {
        display: none;
      }
    }

    .projects-empty h3 {
      margin: 0;
      max-width: 340px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.35;
      font-weight: 560;
    }

    .projects-empty p {
      margin: 0;
      max-width: 340px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 760px) {
      .projects-header {
        height: 52px;
        padding: 0 16px;
      }
      .projects-title {
        display: none;
      }
      .projects-mobile-title {
        display: block;
      }
      .projects-search-wrap,
      .projects-main {
        padding-left: 16px;
        padding-right: 16px;
      }
      .projects-button.secondary {
        display: none;
      }
    }



    @keyframes claude-page-appear {
      from {
        opacity: 0;
        transform: translateY(12px) scale(.992);
        filter: blur(2px);
      }
      58% {
        opacity: 1;
        filter: blur(0);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes claude-page-child-rise {
      from { opacity: 0; transform: translateY(7px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .empty-state,
    .chat-state,
    .projects-page {
      animation: claude-page-appear 260ms cubic-bezier(.165, .85, .45, 1) both;
      transform-origin: 50% 44%;
    }

    .projects-page .projects-header,
    .projects-page .projects-search-wrap,
    .projects-page .projects-main,
    .projects-page .chats-main {
      animation: claude-page-child-rise 260ms cubic-bezier(.2,.8,.2,1) both;
    }

    .projects-page .projects-search-wrap { animation-delay: 35ms; }
    .projects-page .projects-main,
    .projects-page .chats-main { animation-delay: 70ms; }

    @media (prefers-reduced-motion: reduce) {
      .empty-state,
      .chat-state,
      .projects-page,
      .projects-page .projects-header,
      .projects-page .projects-search-wrap,
      .projects-page .projects-main,
      .projects-page .chats-main,
      .claude-sidebar .side-icon,
      .claude-sidebar .side-icon path,
      .claude-sidebar .side-icon circle,
      .claude-sidebar .side-icon rect {
        animation: none !important;
        transition: none !important;
      }
    }

    .hidden { display: none !important; }

    @media (min-width: 640px) {
      .headline {
        font-size: 36px;
      }
    }

    @media (max-width: 560px) {
      .empty-shell { gap: 18px; }
      .headline {
        flex-direction: column;
        gap: 8px;
        font-size: 28px;
      }
      .model-label-full { display: none; }
      .model-trigger { padding: 0 8px; }
      .dropdown-content { right: -40px; min-width: 238px; }
      .viewport { padding-top: 28px; }
      .user-bubble { max-width: 88%; }
      .mode-tab { padding: 0 10px; }
    }

    @media (min-width: 561px) {
      .model-label-short { display: none; }
    }
  </style>
</head>

    const DESIGN_GUIDE = "The typical flow is:\n\n1. Create a project.\n2. Attach or import the design system you want Claude to build with.\n3. Add any relevant context (screenshots, a codebase).\n4. Describe what you want to build.\n5. Review what Claude generates on the canvas.\n6. Refine through chat, edit directly on the canvas, or leave inline comments.\n7. Export or share when you’re happy with the result.\n\n**Move between Claude Design and Claude Code**\n\nYou can move between working in Claude Design and Claude Code while keeping your work synced. Use `/design-sync` to pull in your design system, so everything you build in Claude Design starts from your existing components. When a design is ready to become software, you can hand it off to Claude Code, which continues from your existing work instead of starting over from a screenshot.\n\nIf you prefer to work from Claude Code, connect the Claude Design MCP server to create and edit designs without leaving your terminal:\n\n1. Add the server:  \n`claude mcp add --scope user --transport http claude-design https://api.anthropic.com/v1/design/mcp`\n\n2. Run `/design-login` to sign in.\n\nOnce you're connected, you can import a design into your codebase, export your code as a live prototype, or let Claude build the whole thing from start to finish.\n\n**Create a new project**\n\nWhen you create a project, it automatically inherits your organization’s design system. You don’t need to upload brand assets or configure anything—your brand colors, fonts, and components are already in place.\n\n**Attach or import your design system**\n\nBring in one or several design systems from a GitHub repo, design files, raw uploads, or your local codebase using the `/design-sync` command in Claude Code. Claude builds with your real design system components, checks its own output against your design system, and makes corrections before you see them.\n\nFor larger teams, the Claude Design Admin custom role lets an admin approve a standard system and lock down edits, so the work always matches your company guidelines.\n\n**Add context to your project**\n\nThe more context you give Claude, the better your output will be. You can attach reference material at any point during a project.\n\n- **Screenshots, images, or existing assets:** Upload screenshots of existing designs, competitor products, wireframes, or visual inspiration. You can also attach an existing slide deck or document with a design style you want to replicate. Useful for “make it look like this” requests.\n- **Codebases and existing design files:** Link a code repository so Claude understands your existing components, architecture, and styling patterns. This makes prototypes more production-ready from the start. Import also supports multiple ways to upload existing product design work.\n\n**Write effective prompts**\n\nYou don’t need to be a designer to get great results. Be specific about what you’re building, who it’s for, and what matters most.\n\nA good prompt includes the **goal** (what you’re building), the **layout** (how things should be arranged), the **content** (what information to display), and the **audience** (who will use it). Claude will also ask clarifying questions if it needs more information.\n\nHere are some examples of prompts that work well:\n\n- “Create a dashboard showing monthly revenue with filters for region and product line.”\n- “Design a mobile app onboarding flow with 4 screens that walks users through our core features.”\n- “Build a landing page for our new API product with a hero section, code examples, and pricing.”\n- “Create a form for collecting customer feedback with conditional questions based on category.”\n- “Design an internal tool for our ops team to review and approve content submissions.”\n\n**Refine your design**\n\nThe first generation is a starting point. The real value comes from iterating.\n\n**Using chat**\n\nChat is best for broad changes that affect the overall design:\n\n- “Make the color scheme darker and more minimal.”\n- “Rearrange the dashboard so metrics are in the top row and the chart is below.”\n- “Add a settings panel on the right side.”\n- “Show me 2–3 alternative layouts for this page.”\n\nYou can also ask Claude to explain its design decisions, suggest improvements, or review the design for accessibility.\n\n**Using inline comments**\n\nInline comments let you click directly on a specific part of the canvas and request a targeted change. This is faster than describing the location in chat.\n\nExamples of good inline comments:\n\n- “Make this button padding larger.”\n- “Change this to a dropdown instead of radio buttons.”\n- “Use the primary brand color here.”\n- “Make this section collapsible.”\n\n**Note:** If your comments aren’t being picked up, paste the feedback directly into the chat instead. This is a known workaround for an intermittent issue where comments can disappear before Claude reads them.\n\n**Edit directly on the canvas**\n\nUse rich layout controls for quick visual and aesthetic shifts, specifically to drag, resize, and align elements directly.\n\n**When to use chat vs. comments vs. edit directly**\n\nUse **comments** for targeted, component-level changes (“fix this button,” “adjust this spacing”). Use **chat** for structural changes, new sections, or anything that requires explanation or context. **Edit directly** for quick visual and aesthetic changes.\n\n**Manage versions and revisions**\n\nIf you want to explore a different direction without losing your current work, tell Claude: “Save what we have and try a completely different approach.” Claude will save your current project and confirm where it’s saved, so you can reference earlier iterations in the conversation easily.\n\n**Export and share**\n\nOnce your design is ready, you can share it with colleagues or export it for use elsewhere. The right format depends on your use case—whether you’re getting stakeholder feedback, handing off to engineering, or     function removeMarkdownTableSeparatorRows(text) {
      const lines = String(text || '').split('\n');
      let inFence = false;
      return lines
        .filter(line => {
          const trimmed = line.trim();
          if (trimmed.startsWith('```')) {
            inFence = !inFence;
            return true;
          }
          if (inFence) return true;
          if (!trimmed.includes('|')) return true;
          const cells = trimmed.replace(/^\|/, '').replace(/\|$/, '').split('|').map(cell => cell.trim());
          if (cells.length < 2) return true;
          return !cells.every(cell => /^:?-{3,}:?$/.test(cell));
        })
        .join('\n');
    }

    function splitMarkdownBlocks(text) {
      const lines = String(text || '').trim().split('\n');
      const blocks = [];
      let current = [];
      let inFence = false;

      for (const line of lines) {
        if (line.trim().startsWith('```')) {
          current.push(line);
          inFence = !inFence;
          if (!inFence) {
            blocks.push(current.join('\n'));
            current = [];
          }
          continue;
        }

        if (!inFence && !line.trim()) {
          if (current.length) {
            blocks.push(current.join('\n'));
            current = [];
          }
          continue;
        }

        current.push(line);
      }

      if (current.length) blocks.push(current.join('\n'));
      return blocks.filter(Boolean);
    }

    function highlightCode(code, language = 'text') {
      const lang = normalizeLanguage(language);
      const tokens = [];
      const tokenStart = '\uE000';
      const tokenEnd = '\uE001';
      const tokenBase = 0xE100;
      const stashHtml = (html) => {
        const key = `${tokenStart}${String.fromCharCode(tokenBase + tokens.length)}${tokenEnd}`;
        tokens.push(html);
        return key;
      };
      const stashRaw = (className, value) => stashHtml(`<span class="${className}">${escapeHtml(value)}</span>`);
      let work = String(code || '');

      // Stash strings and comments before escaping/highlighting so token regexes do not corrupt them.
      work = work.replace(/(`(?:\\.|[^`\\])*`|'(?:\\.|[^'\\])*'|"(?:\\.|[^"\\])*")/g, match => stashRaw('tok-string', match));

      if (['python', 'py'].includes(lang)) {
        work = work.replace(/#[^\n]*/g, match => stashRaw('tok-comment', match));
      } else if (['javascript', 'typescript', 'css', 'html', 'bash', 'json'].includes(lang)) {
        work = work.replace(/\/\*[\s\S]*?\*\/|\/\/[^\n]*/g, match => stashRaw('tok-comment', match));
        if (lang === 'bash') work = work.replace(/#[^\n]*/g, match => stashRaw('tok-comment', match));
      }

      work = escapeHtml(work);
      const stashEscaped = (className, value) => stashHtml(`<span class="${className}">${value}</span>`);

      if (['html', 'xml', 'svg'].includes(lang)) {
        work = work.replace(/(&lt;\/?)([A-Za-z][\w:-]*)/g, (_, open, tag) => `${open}${stashEscaped('tok-tag', tag)}`);
        work = work.replace(/\b([A-Za-z_:][\w:.-]*)(?=\s*=)/g, match => stashEscaped('tok-attr', match));
      }

      if (lang === 'css') {
        work = work.replace(/\b(-?[A-Za-z][\w-]*)(?=\s*:)/g, match => stashEscaped('tok-property', match));
      }

      work = work.replace(/(@[A-Za-z_][\w.]*)/g, match => stashEscaped('tok-decorator', match));
      const keywordPattern = /\b(async|await|class|def|return|if|else|elif|for|while|try|except|catch|finally|with|as|import|from|yield|lambda|True|False|None|and|or|not|in|is|pass|break|continue|raise|global|nonlocal|assert|del|match|case|function|const|let|var|new|switch|throw|extends|export|default|interface|type|public|private|protected|static|void|null|undefined|true|false|this|super)\b/g;
      const builtinPattern = /\b(console|Math|Array|Object|String|Number|Boolean|Promise|JSON|Date|RegExp|Map|Set|print|len|range|str|int|float|dict|list|tuple|open|enumerate|zip|map|filter)\b/g;
      work = work.replace(keywordPattern, match => stashEscaped('tok-keyword', match));
      work = work.replace(builtinPattern, match => stashEscaped('tok-builtin', match));
      work = work.replace(/\b([A-Za-z_$][\w$]*)(?=\s*:)/g, match => stashEscaped('tok-property', match));
      work = work.replace(/(\.)([A-Za-z_$][\w$]*)/g, (_, dot, name) => `${dot}${stashEscaped('tok-property', name)}`);
      work = work.replace(/\b([A-Za-z_$][\w$]*)(?=\s*\()/g, match => stashEscaped('tok-function', match));
      work = work.replace(/\b([A-Z][A-Za-z0-9_]+)\b/g, match => stashEscaped('tok-class', match));
      work = work.replace(/\b(\d+(?:\.\d+)?)\b/g, match => stashEscaped('tok-number', match));
      work = work.replace(/(===|!==|==|!=|<=|>=|=>|->|\+=|-=|\*=|\/=|\*\*|\+|-|\*|\/|%|=|:)/g, match => stashEscaped('tok-operator', match));

      const tokenPattern = new RegExp(`${tokenStart}([\\uE100-\\uEFFF])${tokenEnd}`, 'g');
      return work.replace(tokenPattern, (_, marker) => tokens[marker.charCodeAt(0) - tokenBase] ?? '');

    function renderCodeBlock(block, { highlight = true } = {}) {
      const completeFence = block.match(/^```([^\n`]*)\n?([\s\S]*?)```$/);
      const partialFence = block.match(/^```([^\n`]*)\n?([\s\S]*)$/);
      const fence = completeFence || partialFence;

      // expensive. Stream plain escaped code, then highlight once on completion.
